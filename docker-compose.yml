services:
  # 后台爬虫服务
  spider:
    build: .
    container_name: workspace-spider
    restart: always
    volumes:
      - ./spider.py:/app/spider.py
      - ./requirements.txt:/app/requirements.txt
      - ./public:/app/public
    environment:
      - TZ=Asia/Shanghai
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_API_TIMEOUT=${GITHUB_API_TIMEOUT:-20}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 健康检查：探"输出文件新鲜度"而非进程存活——
    # finance-news.json 每轮(约 60s)被覆写一次，若 5 分钟内没更新说明抓取链路已僵死。
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time,sys; p='/app/public/finance-news.json'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p) < 300 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  # 前端 Web 服务 (Nginx)
  web:
    image: nginx:alpine
    container_name: workspace-web
    restart: always
    ports:
      - "1881:80"
    volumes:
      - ./public:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - TZ=Asia/Shanghai
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 健康检查：探首页可访问性。nginx:alpine 自带 wget。
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - spider
