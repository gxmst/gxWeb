services:
  # 后台爬虫服务
  spider:
    build: .
    container_name: workspace-spider
    restart: always
    volumes:
      - ./spider.py:/app/spider.py
      - ./requirements.txt:/app/requirements.txt
      - ./public:/app/public
    environment:
      - TZ=Asia/Shanghai
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_API_TIMEOUT=${GITHUB_API_TIMEOUT:-20}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 健康检查：探 heartbeat 文件（_fast_loop 每轮无条件 touch），证明工作线程还在转。
    # 不再探 finance-news.json，因为所有数据源同时挂掉时它不会更新——
    # 会导致 unhealthy → restart → 再挂 的死循环。数据新鲜度由 ticker-status.json 等业务文件单独监控。
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time,sys; p='/app/public/heartbeat.txt'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p) < 300 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  # 前端 Web 服务 (Nginx)
  web:
    image: nginx:alpine
    container_name: workspace-web
    restart: always
    ports:
      - "1881:80"
    volumes:
      - ./public:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
    environment:
      - TZ=Asia/Shanghai
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 健康检查：探首页可访问性。
    # 用 127.0.0.1 而非 localhost——容器内 localhost 可能先解析到 IPv6 ::1，
    # 而 nginx `listen 80;` 只监听 IPv4，会导致 wget 连接被拒、误判 unhealthy。
    # busybox 版 wget 不支持 --spider/--tries，用 -q -O /dev/null。
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - spider
