server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩：对文本类资源生效（tailwind.js ~407KB、index.html ~84KB、
    # finance-news.json 可达数百 KB，跨太平洋访问收益明显）。
    # 注：nginx:alpine 内置 gzip，未内置 brotli，故只开 gzip。
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml
        application/rss+xml;

    # 安全头：所有 location 都需要重复声明——
    # nginx 的 add_header 在 location 块出现就会覆盖 server 级，因此用 include 抽公共片段。
    include /etc/nginx/conf.d/security-headers.conf;

    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # 动态数据：爬虫持续覆写，必须每次拉最新，禁止缓存。
    location ~* \.(json|txt)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # 字体：内容不变，文件名稳定，可长缓存 + immutable，回访零请求。
    location ~* \.(woff2|woff|ttf|otf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # vendor JS / CSS：文件名不带 hash，允许浏览器缓存但每次复用前必须向服务器校验，
    # 避免 index.html 已更新、app.css 仍命中旧缓存导致新 class 丢样式。
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, no-cache, must-revalidate" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # 图片：壁纸前端已用 ?v= 做版本控制，favicon 等变动少，1 天缓存。
    location ~* \.(jpg|jpeg|png|webp|ico|svg)$ {
        add_header Cache-Control "public, max-age=86400" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }
}
