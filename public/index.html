<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vibe Workspace</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <!-- 寮曞叆 Tailwind CSS 寮曟搸 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        .numeric {
            font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", "Liberation Mono", "Menlo", monospace;
            font-variant-numeric: tabular-nums;
        }

        /* 鏍稿績锛氭瘺鐜荤拑璐ㄦ劅 */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* 闅愯棌婊氬姩鏉′絾淇濈暀婊氬姩鍔熻兘 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 杩涘満鍔ㄧ敾 */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-down {
            animation: slideDown 0.4s ease-out forwards;
        }

        @keyframes subtleGlow {
            from {
                background: rgba(250, 204, 21, 0.14);
            }

            to {
                background: rgba(250, 204, 21, 0);
            }
        }

        .tab-btn {
            color: rgba(255, 255, 255, 0.52);
            transition: all 0.25s ease;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.92);
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-btn-active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), 0 10px 20px rgba(0, 0, 0, 0.22);
        }

        /* 鏂伴椈椤规偓鍋滀紭鍖?*/
        .news-item-hover {
            transition: background 0.2s ease;
            border-radius: 0.75rem;
        }

        .news-item-hover:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* 绉戞妧鑱氬悎鍧楁牱寮忛€傞厤 */
        .tech-content br {
            display: block;
            margin-top: 0.5rem;
            content: "";
        }

        .tech-content a:hover {
            filter: brightness(1.2);
            text-decoration: underline;
        }

        .tech-content a {
            color: #7dd3fc !important;
            text-decoration: underline;
            text-decoration-color: rgba(125, 211, 252, 0.55);
            text-underline-offset: 0.18em;
            text-shadow: 0 1px 10px rgba(8, 47, 73, 0.3);
        }

        .tech-content a:hover {
            color: #e0f2fe !important;
            text-decoration-color: rgba(224, 242, 254, 0.9);
            background: linear-gradient(180deg, rgba(8, 47, 73, 0.22), rgba(8, 47, 73, 0.08));
        }

        .news-link {
            color: #7dd3fc;
            text-decoration: underline;
            text-decoration-color: rgba(125, 211, 252, 0.55);
            text-underline-offset: 0.18em;
            text-shadow: 0 1px 10px rgba(8, 47, 73, 0.3);
            transition: color 0.2s ease, text-decoration-color 0.2s ease, background-color 0.2s ease;
            border-radius: 0.35rem;
            padding: 0 0.1rem;
            background: linear-gradient(180deg, rgba(8, 47, 73, 0.14), rgba(8, 47, 73, 0.02));
        }

        .news-link:hover {
            color: #bae6fd;
            text-decoration-color: rgba(186, 230, 253, 0.9);
            background: linear-gradient(180deg, rgba(8, 47, 73, 0.22), rgba(8, 47, 73, 0.08));
        }

        /* 楠ㄦ灦灞忓姩鐢?*/
        @keyframes shimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.04) 75%);
            background-size: 400px 100%;
            animation: shimmer 1.8s infinite linear;
            border-radius: 0.375rem;
        }
        .skeleton-line { height: 0.75rem; margin-bottom: 0.5rem; }
        .skeleton-line-sm { height: 0.5rem; width: 40%; margin-bottom: 0.75rem; }

        /* sparkline */
        .sparkline-svg { display: block; overflow: visible; }
        .sparkline-poly { fill: none; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>

<body
    class="min-h-screen w-screen text-white font-sans bg-gray-900 flex flex-col md:flex-row md:h-screen md:overflow-hidden overflow-y-auto no-scrollbar">

    <!-- 鍔ㄦ€佽儗鏅?-->
    <div class="fixed inset-0 z-0">
        <img id="bgImage1" translate="no" src=""
            class="absolute inset-0 w-full h-full object-cover pointer-events-none select-none transition-opacity duration-1000 ease-in-out z-[1] opacity-0"
            alt="">
        <img id="bgImage2" translate="no" src=""
            class="absolute inset-0 w-full h-full object-cover pointer-events-none select-none transition-opacity duration-1000 ease-in-out z-[2] opacity-0"
            alt="">

        <!-- 鑷€傚簲姘涘洿鍏夋檿 (涓€ф彁浜紝纭繚閫忚繃鐜荤拑鎻愬彇澹佺焊鑹插僵) -->
        <div
            class="absolute top-1/4 -right-20 w-[500px] h-[500px] bg-white/5 rounded-full filter blur-[110px] pointer-events-none animate-pulse z-10">
        </div>
        <div
            class="absolute bottom-1/3 -right-32 w-[450px] h-[450px] bg-slate-300/10 rounded-full filter blur-[100px] pointer-events-none z-10">
        </div>

        <!-- 鍔ㄦ€佸ぉ姘旀护闀滃眰 -->
        <div id="weatherOverlay" class="absolute inset-0 bg-black/40 transition-colors duration-1000 z-20"></div>
        <!-- 鐗╃悊绮掑瓙鐢诲竷 -->
        <canvas id="weatherCanvas" class="absolute inset-0 z-30 pointer-events-none"></canvas>
    </div>

    <!-- 宸︿笂瑙掞細鎺у埗涓績 -->
    <div class="absolute top-6 left-6 flex gap-4 z-30">
        <button id="wallpaperBtn" onclick="toggleWallpaper()" style="opacity: 0.5; pointer-events: none;"
            class="w-10 h-10 glass rounded-full flex items-center justify-center hover:scale-110 active:scale-95 transition-all group shadow-lg outline-none focus:outline-none"
            title="鍒囨崲澹佺焊">
            <svg class="w-5 h-5 text-white/70 group-hover:text-white" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                </path>
            </svg>
        </button>
        <button onclick="toggleWeatherFilter()" id="filterBtn"
            class="w-10 h-10 glass rounded-full flex items-center justify-center hover:scale-110 active:scale-95 transition-all group shadow-lg text-lg outline-none focus:outline-none"
            title="切换环境滤镜">✨</button>
    </div>

    <!-- 涓讳綋鍐呭鍖?(宸︿晶) -->

        <!-- 鏃堕棿涓庡ぉ姘?-->
        <div class="flex flex-col items-center mb-10">
            <div id="clock"

            </div>
            <div

                <span id="dateInfo">鑾峰彇鏃ユ湡涓?..</span>
                <span class="opacity-40">|</span>
                <span id="weatherInfo">鑾峰彇澶╂皵涓?..</span>
            </div>
        </div>

        <!-- 铻嶅悎鎼滅储妗?(鍐呭祵寮曟搸閫夋嫨) -->
        <div id="search-bar"
            class="w-full max-w-2xl bg-white/5 backdrop-blur-[40px] backdrop-saturate-150 backdrop-brightness-110 border border-white/20 rounded-full flex items-center p-1.5 pr-4 mb-12 transition-all duration-300 hover:scale-[1.01] focus-within:scale-[1.05] focus-within:ring-4 focus-within:ring-white/20 focus-within:bg-white/10 shadow-[inset_0_1px_1px_rgba(255,255,255,0.3),0_20px_50px_rgba(0,0,0,0.4)] overflow-hidden">
            <svg class="w-5 h-5 text-white/50 ml-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="鍦ㄧ綉缁滀笂鎼滅储..."

            <!-- 鍐呭祵寮曟搸鍒囨崲 -->
            <div class="flex gap-2 pr-1 shrink-0">
                <button onclick="setSearchEngine('bing')" id="eng-bing"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">蹇呭簲</button>
                <button onclick="setSearchEngine('baidu')" id="eng-baidu"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">鐧惧害</button>
                <button onclick="setSearchEngine('google')" id="eng-google"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">璋锋瓕</button>
                <button onclick="setSearchEngine('duck')" id="eng-duck"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">D</button>
            </div>
        </div>

    <aside class="relative z-10 w-full p-6 flex flex-col group/aside md:w-[450px] md:h-screen">
        <!-- 鎷栨嫿鎵嬫焺 -->
        <div id="resizer"
            class="hidden md:block absolute left-0 top-0 w-1.5 h-full cursor-ew-resize z-20 hover:bg-white/30 transition-colors group-hover/aside:bg-white/10">
        </div>

        <div id="news-panel"
            class="bg-white/5 backdrop-blur-[40px] backdrop-saturate-150 backdrop-brightness-110 border border-white/20 flex-1 rounded-3xl p-6 flex flex-col overflow-hidden relative shadow-[inset_0_1px_1px_rgba(255,255,255,0.3),0_25px_50px_rgba(0,0,0,0.5)]">
            <!-- 鏍囬鏍?-->
            <div class="flex items-center justify-between mb-4 border-b border-white/10 pb-4">
                <div class="flex items-center gap-3">
                    <h2 class="text-lg font-bold tracking-wider text-white/90">7x24 甯傚満蹇</h2>
                    <div class="flex items-center gap-1 bg-white/5 p-0.5 rounded-md text-[10px] border border-white/5">
                        <button onclick="setFontSize('sm')" id="fs-sm"
                            class="px-2 py-0.5 rounded transition-all bg-white/20 text-white shadow-sm">灏?/button>
                        <button onclick="setFontSize('base')" id="fs-base"
                            class="px-2 py-0.5 rounded transition-all text-white/50 hover:text-white/90">涓?/button>
                        <button onclick="setFontSize('lg')" id="fs-lg"
                            class="px-2 py-0.5 rounded transition-all text-white/50 hover:text-white/90">澶?/button>
                    </div>
                </div>
                <div class="flex items-center gap-2">

            <!-- 婊氬姩鍒楄〃鍖?(澧炲姞 pb-24 闃叉琚簳閮ㄨ鎯呮潯鎸′綇) -->

    <!-- 搴曢儴锛氬疄鏃惰鎯呮潯 (闈欐€佸弻琛屾粦鍔ㄥ竷灞€) -->
    <footer id="bottom-ticker"

        <!-- 淇鍚庣殑缈婚〉鎸夐挳锛氬乏 -->

        <!-- 鐪熸鐨勬í鍚戞粴鍔ㄥ鍣?-->
        <div id="tickerScroll"
            class="flex items-center gap-8 px-14 py-1.5 w-full h-full overflow-x-auto no-scrollbar scroll-smooth">
            <div id="tickerContent" class="flex items-center gap-8 min-w-max">

                <div class="skeleton" style="width:80px;height:32px;border-radius:6px"></div>
                <div class="skeleton" style="width:80px;height:32px;border-radius:6px"></div>
                <div class="skeleton" style="width:80px;height:32px;border-radius:6px"></div>
                <div class="skeleton" style="width:80px;height:32px;border-radius:6px"></div>
                <div class="skeleton" style="width:80px;height:32px;border-radius:6px"></div>
                <div class="skeleton" style="width:80px;height:32px;border-radius:6px"></div>
                <div class="skeleton" style="width:80px;height:32px;border-radius:6px"></div>

        <!-- 淇鍚庣殑缈婚〉鎸夐挳锛氬彸 -->
        <button onclick="scrollTicker(500)"
            class="absolute right-2 top-1/2 -translate-y-1/2 z-50 w-8 h-8 bg-black/50 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center opacity-0 group-hover/ticker:opacity-100 transition-all hover:bg-white/20 outline-none shadow-lg">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>

    </footer>

    <script>
        // ================== 1. 澹佺焊鏀惰棌澶瑰紩鎿?(鍔ㄦ€佸姞杞? ==================
        let wallpapersArray = [];
        let currentBgIndex = 0;
        let activeBgLayer = 1;
        let isSwitchingBg = false;
        const vSuffix = new Date().toLocaleDateString('zh-CN');

        async function initWallpapers() {
            try {
                const resp = await fetch('./wallpapers.json?t=' + Date.now());
                wallpapersArray = await resp.json();
                if (wallpapersArray && wallpapersArray.length > 0) {
                    // 鍒濆鍖栫涓€寮犲苟棰勫姞杞?
                    const img1 = document.getElementById('bgImage1');
                    const img2 = document.getElementById('bgImage2');
                    const firstSrc = wallpapersArray[0] + '?v=' + vSuffix;
                    img1.onload = () => {
                        img1.classList.remove('opacity-0');
                        img1.classList.add('opacity-100');
                    };
                    img1.src = firstSrc;
                    img2.src = firstSrc;
                    wallpapersArray.forEach(url => {
                        const img = new Image();
                        img.src = url + '?v=' + vSuffix;
                    });
                    // 鍒楄〃鍔犺浇鎴愬姛鍚庢縺娲诲垏鎹㈡寜閽?
                    const btn = document.getElementById('wallpaperBtn');
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                }
            } catch (e) {
                console.error("鍔犺浇澹佺焊鍒楄〃澶辫触:", e);
            }
        }
        initWallpapers();

        // ================== 2. 鍩虹 UI 鎺у埗 ==================

        // 瀹炴椂鏃堕挓
        const clockEl = document.getElementById('clock');
        const dateInfoEl = document.getElementById('dateInfo');

        function updateClock() {
            const now = new Date();
            clockEl.innerText = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            // 瀹岀編澶勭悊鏃ユ湡鍜屾槦鏈熺殑绌烘牸
            dateInfoEl.innerText = dateStr;
        }
        setInterval(updateClock, 1000); updateClock();

        // 鎼滅储寮曟搸
        let currentEngine = localStorage.getItem('preferredEngine') || 'bing';
        const engines = {
            bing: { name: '蹇呭簲', url: 'https://www.bing.com/search?q=', color: '#00809D' },
            baidu: { name: '鐧惧害', url: 'https://www.baidu.com/s?wd=', color: '#2932E1' },
            google: { name: '璋锋瓕', url: 'https://www.google.com/search?q=', color: '#EA4335' },
            duck: { name: 'Duck', url: 'https://duckduckgo.com/?q=', color: '#DE5833' }
        };
        function setSearchEngine(engine) {
            currentEngine = engine; localStorage.setItem('preferredEngine', engine);
            document.getElementById('searchInput').placeholder = `鍦?${engines[engine].name} 涓婃悳绱?..`;
            Object.keys(engines).forEach(key => {
                const btn = document.getElementById('eng-' + key);
                if (key === engine) {
                    btn.style.color = engines[key].color;
                    btn.className = 'px-3 py-1 rounded-full bg-white/20 text-white font-bold shadow-lg transition-all shrink-0 scale-105 border border-white/20';
                } else {
                    btn.style.color = '';
                    btn.className = 'px-3 py-1 rounded-full text-white/60 hover:text-white transition-all shrink-0 hover:bg-white/10';
                }
            });
        }
        setSearchEngine(currentEngine);
        function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('searchInput').value.trim();
                if (query) window.open(engines[currentEngine].url + encodeURIComponent(query), '_blank');
            }
        }

        // 澹佺焊杞崲 (鍔ㄦ€侀€傞厤鏀惰棌澶?+ 蹇呭簲 5 鍥?
        function toggleWallpaper() {
            if (wallpapersArray.length === 0) return;
            if (isSwitchingBg) return;
            isSwitchingBg = true;

            currentBgIndex = (currentBgIndex + 1) % wallpapersArray.length;
            const nextSrc = wallpapersArray[currentBgIndex] + '?v=' + vSuffix;

            const img1 = document.getElementById('bgImage1');
            const img2 = document.getElementById('bgImage2');

            const currentLayer = activeBgLayer === 1 ? img1 : img2;
            const hiddenLayer = activeBgLayer === 1 ? img2 : img1;

            hiddenLayer.onload = () => {
                hiddenLayer.style.opacity = '1';
                currentLayer.style.opacity = '0';
                activeBgLayer = activeBgLayer === 1 ? 2 : 1;

                setTimeout(() => {
                    isSwitchingBg = false;
                }, 1000);
            };

            hiddenLayer.onerror = () => {
                isSwitchingBg = false;
            };

            hiddenLayer.src = nextSrc;
        }

        // 琛屾儏鏉＄炕椤甸€昏緫 (AI婕忔帀鐨勫嚱鏁帮紝宸茶ˉ鍏?
        function scrollTicker(amount) {
            document.getElementById('tickerScroll').scrollBy({ left: amount, behavior: 'smooth' });
        }


        // ================== 2. 澶╂皵涓庣矑瀛愮墿鐞嗗紩鎿?==================

        const canvas = document.getElementById('weatherCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;
        let uiBounds = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            updateUIBounds();
        }

        function updateUIBounds() {
            const bar = document.getElementById('search-bar');
            const panel = document.getElementById('news-panel');
            const ticker = document.getElementById('bottom-ticker');
            uiBounds = [];
            if (bar) uiBounds.push(bar.getBoundingClientRect());
            if (panel) uiBounds.push(panel.getBoundingClientRect());
            if (ticker) uiBounds.push(ticker.getBoundingClientRect());
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class WeatherParticle {
            constructor(type) { this.type = type; this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * (canvas.height + 100) - canvas.height;
                this.isLanded = false;
                this.landedTime = 0;
                this.isSplashing = false;
                this.splashRadius = 0;
                this.splashAlpha = 1;
                this.isPuddled = false;
                this.puddleAlpha = 0;
                this.puddleWidth = 0;

                if (this.type === 'rain') {
                    this.speed = 15 + Math.random() * 8;
                    this.len = 10 + Math.random() * 10;
                    this.opacity = 0.15 + Math.random() * 0.2;
                    this.lineWidth = 0.5 + Math.random() * 0.5;
                } else {
                    this.speed = 0.6 + Math.random() * 1.8;
                    this.radius = Math.random() * 3 + 1;
                    this.opacity = 0.4 + Math.random() * 0.4;
                    this.swing = Math.random() * 2;
                    this.swingStep = Math.random() * 100;
                }
            }
            update() {
                if (this.isPuddled) {
                    this.puddleAlpha -= 0.003;
                    if (this.puddleAlpha <= 0) this.reset();
                    return;
                }

                if (this.isLanded) {
                    this.landedTime++;
                    if (this.landedTime > 600 + Math.random() * 400) {
                        this.opacity -= 0.005;
                        if (this.opacity <= 0) this.reset();
                    }
                    return;
                }

                if (this.isSplashing) {
                    this.splashRadius += 1.2;
                    this.splashAlpha -= 0.08;
                    if (this.splashAlpha <= 0) {
                        this.isSplashing = false;
                        this.isPuddled = true;
                        this.puddleAlpha = 0.2;
                        this.puddleWidth = Math.random() * 10 + 5;
                    }
                    return;
                }

                this.y += this.speed;
                if (this.type === 'snow') {
                    this.x += Math.sin(this.swingStep) * this.swing;
                    this.swingStep += 0.02;
                }

                for (const bound of uiBounds) {
                    if (this.x > bound.left + 20 && this.x < bound.right - 20 && this.y > bound.top && this.y < bound.top + 15) {
                        if (this.type === 'snow') {
                            this.isLanded = true;
                            this.y = bound.top;
                        } else {
                            this.isSplashing = true;
                            this.splashRadius = 1;
                            this.splashAlpha = 0.6;
                        }
                        return;
                    }
                }

                if (this.y > canvas.height + 50) this.reset();
            }
            draw() {
                if (this.isLanded) {
                    ctx.beginPath();
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.ellipse(this.x, this.y, this.radius * 2, this.radius * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();
                    return;
                }

                if (this.isSplashing) {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(255, 255, 255, ${this.splashAlpha})`;
                    ctx.lineWidth = 1.5;
                    const r = Math.min(this.splashRadius, 12);
                    ctx.ellipse(this.x, this.y, r, r * 0.3, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    return;
                }

                if (this.isPuddled) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.puddleAlpha})`;
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, this.puddleWidth, 1, 0, 0, Math.PI * 2);
                    ctx.fill();
                    return;
                }

                ctx.beginPath();
                if (this.type === 'rain') {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.lineWidth = this.lineWidth;
                    ctx.moveTo(this.x, this.y); ctx.lineTo(this.x, this.y + this.len);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function animateWeather() {
            updateUIBounds();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            animationId = requestAnimationFrame(animateWeather);
        }

        function applyEnvironmentFilter(weatherKeyword) {
            const overlay = document.getElementById('weatherOverlay');
            const text = String(weatherKeyword || '');
            const isRain = text.includes('雨') || text.includes('🌧');
            const isSnow = text.includes('雪') || text.includes('❄');
            const isSunny = text.includes('晴') || text.includes('☀');

            cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];

            if (isRain) {
                overlay.className = "absolute inset-0 bg-blue-900/30 transition-colors duration-1000 z-20";
                for (let i = 0; i < 200; i++) particles.push(new WeatherParticle('rain'));
                animateWeather();
            } else if (isSunny) {
                overlay.className = "absolute inset-0 bg-amber-200/12 transition-colors duration-1000 z-20";
            } else if (isSnow) {
                overlay.className = "absolute inset-0 bg-slate-800/40 transition-colors duration-1000 z-20";
                for (let i = 0; i < 250; i++) particles.push(new WeatherParticle('snow'));
                animateWeather();
            } else {
                overlay.className = "absolute inset-0 bg-black/30 transition-colors duration-1000 z-20";
            }
        }

        let realWeather = '';
        const filterModes = ['auto', 'sunny', 'rain', 'snow'];
        const filterIcons = ['✨', '☀️', '🌧️', '❄️'];
        let currentFilterIndex = 0;

        function toggleWeatherFilter() {
            currentFilterIndex = (currentFilterIndex + 1) % 4;
            const mode = filterModes[currentFilterIndex];
            document.getElementById('filterBtn').innerText = filterIcons[currentFilterIndex];
            if (mode === 'auto') applyEnvironmentFilter(realWeather);
            else applyEnvironmentFilter(mode);
        }

        async function fetchWeather() {
            try {
                const response = await fetch('./weather.txt?t=' + Date.now());
                if (!response.ok) throw new Error();
                const text = await response.text();
                if (!text.includes('澶辫触')) {
                    realWeather = text;
                    document.getElementById('weatherInfo').innerText = text;
                    if (filterModes[currentFilterIndex] === 'auto') applyEnvironmentFilter(realWeather);
                }
            } catch { document.getElementById('weatherInfo').innerText = '鏆傛棤澶╂皵鏁版嵁'; }
        }
        fetchWeather(); setInterval(fetchWeather, 600000);

        // ================== 3. 搴曢儴琛屾儏鍙岃鎺掔増 ==================

        const SPARKLINE_MIN_POINTS = 3;

        function buildSparklineSVG(history, isUp) {
            if (!history || history.length < 2) return '';
            const w = 36, h = 14;
            const min = Math.min(...history), max = Math.max(...history);
            const range = max - min || 1;
            const pts = history.map((v, i) => {
                const x = (i / (history.length - 1)) * w;
                const y = h - ((v - min) / range) * (h - 2) - 1;
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(' ');
            const color = isUp ? '#f87171' : '#34d399';
            return `<svg class="sparkline-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline class="sparkline-poly" points="${pts}" stroke="${color}" opacity="0.6"/></svg>`;
        }

        async function fetchTickerData() {
            try {
                const response = await fetch('./ticker.json?t=' + Date.now());
                const items = await response.json();
                const container = document.getElementById('tickerContent');
                if (!items || items.length === 0) return;

                // 浼樺寲锛氬鏋滃悗绔鍒犱簡琛屾儏鏉＄洰锛堟暟閲忎笉涓€鑷达級锛屽垯娓呯┖閲嶇粯锛岀‘淇濆垪琛ㄥ悓姝?
                if (container.children.length !== items.length) container.innerHTML = '';

                if (container.children.length === 0) {
                    let html = '';
                    items.forEach(item => {
                        const showSparkline = item.price_history && item.price_history.length >= SPARKLINE_MIN_POINTS;
                        const sparklineHtml = showSparkline ? `<span class="sparkline-container inline-flex items-center" data-symbol="${item.symbol}"></span>` : '';
                        html += `
                        <div class="flex flex-col justify-center min-w-max px-1.5 gap-0" data-symbol="${item.symbol}">
                            <div class="flex items-center gap-1">
                                <span class="text-[9px] text-white/50 tracking-wide drop-shadow-md name-val whitespace-nowrap">${item.name}</span>
                                ${sparklineHtml}
                            </div>
                            <div class="flex items-baseline gap-1">
                                <span class="text-[10px] font-bold text-white drop-shadow-md numeric price-val whitespace-nowrap">--</span>
                                <span class="text-[9px] font-semibold drop-shadow-md numeric change-val whitespace-nowrap">--</span>
                            </div>
                        </div>`;
                    });
                    container.innerHTML = html;
                }

                items.forEach(item => {
                    const el = container.querySelector(`[data-symbol="${item.symbol}"]`);
                    if (el) {
                        const nameEl = el.querySelector('.name-val');
                        if (nameEl) nameEl.innerText = item.name;
                        el.querySelector('.price-val').innerText = item.price;
                        const cEl = el.querySelector('.change-val');
                        cEl.innerText = item.change;
                        const isUp = !item.change.startsWith('-');
                        cEl.className = `text-[9px] font-semibold drop-shadow-md numeric change-val whitespace-nowrap ${isUp ? 'text-rose-400' : 'text-emerald-400'}`;
                        const sparkContainer = el.querySelector('.sparkline-container');
                        if (sparkContainer && item.price_history && item.price_history.length >= SPARKLINE_MIN_POINTS) {
                            sparkContainer.innerHTML = buildSparklineSVG(item.price_history, isUp);
                        }
                    }
                });
            } catch { console.error("琛屾儏鍚屾寮傚父"); }
        }
        fetchTickerData(); setInterval(fetchTickerData, 15000);

        async function fetchTickerStatus() {
            try {
                const resp = await fetch('./ticker-status.json?t=' + Date.now());
                const ts = await resp.json();
                if (!ts || !ts.status) return;
                const statusText = document.getElementById('statusText');
                const statusPing = document.getElementById('statusPing');
                const statusDot = document.getElementById('statusDot');

                const ageMinutes = ts.updated_at ? (Date.now() / 1000 - ts.updated_at) / 60 : 0;
                if (ageMinutes > 5) {
                    statusText.innerText = '绂荤嚎';
                    statusText.className = 'text-[10px] font-bold text-red-400';
                    statusPing.className = 'hidden';
                    statusDot.className = 'relative inline-flex rounded-full h-2 w-2 bg-red-500';
                    statusDot.parentElement.parentElement.title = '行情数据超过5分钟未更新';
                    return;
                }

                if (ts.status === 'failed') {
                    statusText.innerText = '琛屾儏澶辫触';
                    statusText.className = 'text-[10px] font-bold text-red-400';
                    statusPing.className = 'hidden';
                    statusDot.className = 'relative inline-flex rounded-full h-2 w-2 bg-red-500';
                    statusDot.parentElement.parentElement.title = '行情源失败，当前显示上次成功数据';
                } else if (ts.status === 'degraded') {
                    statusText.innerText = '闄嶇骇';
                    statusText.className = 'text-[10px] font-bold text-amber-400';
                    statusPing.className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75';
                    statusDot.className = 'relative inline-flex rounded-full h-2 w-2 bg-amber-500';
                    statusDot.parentElement.parentElement.title = '行情源降级，部分使用备用源';
                } else {
                    statusText.innerText = 'LIVE';
                    statusText.className = 'text-[10px] font-bold text-green-400';
                    statusPing.className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75';
                    statusDot.className = 'relative inline-flex rounded-full h-2 w-2 bg-green-500';
                    statusDot.parentElement.parentElement.title = '行情源正常';
                }
            } catch { /* ticker-status 涓嶅彲鐢ㄦ椂淇濇寔鍘熺姸 */ }
        }
        fetchTickerStatus(); setInterval(fetchTickerStatus, 15000);

        // ================== 4. 鏂伴椈娴佷笌浜や簰娓叉煋 ==================

        let allNewsData = [];
        let currentFilter = 'all';
        let lastFirstNewsContent = '';
        let currentFontSize = 'sm';

        // 缁熶竴娓叉煋鍑芥暟锛氭牴鎹綋鍓嶆暟鎹拰杩囨护鏉′欢锛屽叏閲忛噸缁樺垪琛?
        function renderNewsList() {
            const listContainer = document.getElementById('newsList');
            const filtered = allNewsData.filter(applyFilter);

            listContainer.innerHTML = '';
            if (filtered.length === 0) {
                listContainer.innerHTML = '<div class="text-center text-white/30 mt-10 text-sm">鏆傛棤瀵瑰簲蹇</div>';
            } else {
                filtered.forEach(n => listContainer.appendChild(createNewsElement(n)));
            }
        }

        // 瀛椾綋鍒囨崲 (0 寤舵椂鏈湴绉掑垏)
        function setFontSize(size) {
            currentFontSize = size;
            ['sm', 'base', 'lg'].forEach(s => {
                const btn = document.getElementById('fs-' + s);
                if (s === size) { btn.classList.add('bg-white/20', 'text-white'); btn.classList.remove('text-white/50'); }
                else { btn.classList.remove('bg-white/20', 'text-white'); btn.classList.add('text-white/50'); }
            });
            renderNewsList();
        }

        // 瀛椾綋鍒囨崲 (0 寤舵椂鏈湴绉掑垏)
        function setFontSize(size) {
            currentFilter = filter;
            const apply = () => {
                ['all', 'news', 'foreign', 'tech'].forEach(t => {
                    const btn = document.getElementById('tab-' + t);
                    if (btn) {
                        if (t === filter) {
                            btn.className = 'flex-1 py-1.5 text-xs font-bold rounded-lg transition-all duration-300 bg-white/20 text-white shadow-lg shrink-0 min-w-[60px] scale-[1.02] border border-white/20';
                        } else {
                            btn.className = 'flex-1 py-1.5 text-xs font-medium rounded-lg transition-all duration-300 text-white/40 hover:text-white/70 hover:bg-white/10 shrink-0 min-w-[60px]';
                        }
                    }
                });
                renderNewsList();
            };
            if (document.startViewTransition) {
                document.startViewTransition(apply);
            } else {
                apply();
            }
        }

        function sanitizeHttpUrl(url) {
            if (!url) return '';
            try {
                const parsed = new URL(url, window.location.origin);
                return ['http:', 'https:'].includes(parsed.protocol) ? parsed.href : '';
            } catch {
                return '';
            }
        }

        function normalizeNewsDisplayText(news) {
            const rawText = news.display_content || news.content || '';
            if ((news.category || '') === 'news') {
                return rawText.replace(/^銆怺^銆慮+銆慭s*/, '');
            }
            return rawText;
        }

        function createNewsElement(news, isNew = false) {
            const fs = currentFontSize === 'sm' ? 'text-sm' : (currentFontSize === 'base' ? 'text-base' : 'text-lg');
            const item = document.createElement('div');
            const header = document.createElement('div');
            const body = document.createElement('div');
            const displayText = normalizeNewsDisplayText(news);
            const safeUrl = sanitizeHttpUrl(news.url);
            const isHtmlBlock = news.format === 'html';
            const importantClass = news.is_important ? ' bg-red-500/10 border-red-500/20' : ' border-white/20';

            item.className = `border-l-2 ${importantClass} pl-3 border-b border-white/5 pb-3 mb-3 last:border-b-0 last:mb-0 last:pb-0 news-item-hover [&_a]:text-blue-400 [&_a]:underline [&_a]:hover:text-blue-300` + (isNew ? ' animate-slide-down' : '');

            header.className = 'text-[11px] text-white/40 font-mono mb-0.5 flex items-center';
            header.append(document.createTextNode(news.time || ''));
            if (news.is_important) {
                const badge = document.createElement('span');
                badge.className = 'ml-2 px-1.5 py-0.5 bg-red-500/20 text-red-400 text-[9px] font-bold rounded border border-red-500/30 animate-pulse';
                badge.textContent = 'IMPORTANT';
                header.appendChild(badge);
            }

            body.className = `${fs} leading-loose text-white/90 drop-shadow-sm tech-content`;
            if (isHtmlBlock) {
                body.innerHTML = news.content || '';
            } else if (safeUrl) {
                const link = document.createElement('a');
                link.href = safeUrl;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                link.className = 'news-link visited:text-sky-200';
                link.textContent = displayText;
                body.appendChild(link);
            } else {
                body.textContent = displayText;
            }

            item.appendChild(header);
            item.appendChild(body);
            return item;
        }

        function applyFilter(n) {
            const category = n.category || 'all';
            if (currentFilter === 'news') return category === 'news';
            if (currentFilter === 'foreign') return category === 'foreign';
            if (currentFilter === 'tech') return category === 'tech';
            return true;
        }

        async function fetchRealNews() {
            try {
                const response = await fetch('./finance-news.json?t=' + Date.now());
                const data = await response.json();

                const newsList = (data.news_list || []).map(item => {
                    const normalized = { ...item };
                    if (!normalized.category) {
                        if ((normalized.content || '').includes('GitHub') || (normalized.content || '').includes('HN') || (normalized.content || '').includes('V2EX')) normalized.category = 'tech';
                        else if (normalized.url) normalized.category = 'foreign';
                        else normalized.category = 'news';
                    }
                    if (!normalized.format) normalized.format = normalized.category === 'tech' && !normalized.url ? 'html' : 'text';
                    return normalized;
                });
                if (!newsList || newsList.length === 0) return;

                const listContainer = document.getElementById('newsList');

                // 棣栨鍔犺浇锛氬垵濮嬪寲鏁版嵁骞跺叏閲忔覆鏌?
                if (allNewsData.length === 0) {
                    allNewsData = newsList;
                    lastFirstNewsContent = newsList[0].content;
                    document.getElementById('lastUpdateTime').innerText = `${newsList[0].time}`;
                    const sk = document.getElementById('newsSkeleton');
                    if (sk) sk.remove();
                    renderNewsList();
                    return;
                }

                // 澧為噺鍚屾锛氬彂鐜版柊鏁版嵁鏃讹紝鎵ц骞虫粦鎻掑叆
                if (newsList[0].content !== lastFirstNewsContent) {
                    const newItems = [];
                    for (let n of newsList) {
                        if (n.content === lastFirstNewsContent) break;
                        if (applyFilter(n)) newItems.push(n);
                    }

                    allNewsData = newsList;
                    document.getElementById('lastUpdateTime').innerText = `${newsList[0].time}`;

                    if (newItems.length > 0) {
                        const currentScroll = listContainer.scrollTop;
                        const oldHeight = listContainer.scrollHeight;

                        newItems.reverse().forEach(n => {
                            listContainer.prepend(createNewsElement(n, true));
                        });

                        if (currentScroll > 10) {
                            listContainer.scrollTop = currentScroll + (listContainer.scrollHeight - oldHeight);
                        }
                    } else {
                        renderNewsList();
                    }
                    lastFirstNewsContent = newsList[0].content;
                }
            } catch (e) {
                console.error("蹇鍚屾澶辫触:", e);
                document.getElementById('statusText').innerText = '鏂繛';
                document.getElementById('statusText').className = 'text-[10px] font-bold text-red-400';
                document.getElementById('statusPing').className = 'hidden';
                document.getElementById('statusDot').className = 'relative inline-flex rounded-full h-2 w-2 bg-red-500';
            }
        }

        // ================== 5. 杈呭姪浜や簰涓庡揩鎹烽敭 ==================

        // 鍏ㄥ眬蹇嵎閿洃鍚?
        window.addEventListener('keydown', (e) => {
            const searchInput = document.getElementById('searchInput');
            // 涓€閿仛鐒︽悳绱㈡ ( / 閿?)
            if (e.key === '/' && document.activeElement !== searchInput && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                e.preventDefault();
                searchInput.focus();
            }
            // 涓€閿竻绌哄苟閫€鍑烘悳绱?( Esc 閿?)
            if (e.key === 'Escape' && document.activeElement === searchInput) {
                searchInput.value = '';
                searchInput.blur();
            }
        });

        // 鍥炲埌椤堕儴鎮诞鎸夐挳
        const newsListEl = document.getElementById('newsList');
        const bttBtn = document.getElementById('backToTop');
        newsListEl.addEventListener('scroll', () => {
            if (newsListEl.scrollTop > 300) { bttBtn.classList.remove('opacity-0', 'pointer-events-none'); bttBtn.classList.add('opacity-100'); }
            else { bttBtn.classList.add('opacity-0', 'pointer-events-none'); bttBtn.classList.remove('opacity-100'); }
        });
        function scrollToTop() { newsListEl.scrollTo({ top: 0, behavior: 'smooth' }); }

        // 渚ц竟鏍忔嫋鎷芥媺浼?
        const aside = document.querySelector('aside');
        const resizer = document.getElementById('resizer');
        let isResizing = false;

        // 鍒濆鍖栧姞杞藉搴?
        const savedWidth = localStorage.getItem('newsPanelWidth');
        if (savedWidth && window.innerWidth >= 768) {
            aside.style.width = `${savedWidth}px`;
        }

        resizer.addEventListener('mousedown', () => { if (window.innerWidth < 768) return; isResizing = true; document.body.style.cursor = 'ew-resize'; aside.classList.add('select-none'); });
        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const newWidth = window.innerWidth - e.clientX;
            if (newWidth >= 350 && newWidth <= window.innerWidth * 0.6) {
                aside.style.width = `${newWidth}px`;
            }
        });
        window.addEventListener('mouseup', () => {
            if (isResizing) {
                localStorage.setItem('newsPanelWidth', aside.offsetWidth);
            }
            isResizing = false;
            document.body.style.cursor = 'default';
            aside.classList.remove('select-none');
        });

        // 鍒濆鎷夊彇蹇
        fetchRealNews(); setInterval(fetchRealNews, 10000);
    </script>
</body>

</html>
