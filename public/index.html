<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vibe Workspace</title>
    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        .numeric {
            font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", "Liberation Mono", "Menlo", monospace;
            font-variant-numeric: tabular-nums;
        }

        /* 核心：毛玻璃质感 */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 进场动画 */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-down {
            animation: slideDown 0.4s ease-out forwards;
        }

        @keyframes subtleGlow {
            from {
                background: rgba(250, 204, 21, 0.14);
            }

            to {
                background: rgba(250, 204, 21, 0);
            }
        }

        .tab-btn {
            color: rgba(255, 255, 255, 0.52);
            transition: all 0.25s ease;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.92);
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-btn-active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), 0 10px 20px rgba(0, 0, 0, 0.22);
        }

        /* 新闻项悬停优化 */
        .news-item-hover {
            transition: background 0.2s ease;
            border-radius: 0.75rem;
        }

        .news-item-hover:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body
    class="min-h-screen w-screen text-white font-sans bg-gray-900 flex flex-col md:flex-row md:h-screen md:overflow-hidden overflow-y-auto no-scrollbar">

    <!-- 动态背景 -->
    <div class="fixed inset-0 z-0">
        <img id="bgImage" translate="no" src="bg_0.jpg"
            class="w-full h-full object-cover pointer-events-none select-none transition-all duration-700" alt="">

        <!-- 自适应氛围光晕 (中性提亮，确保透过玻璃提取壁纸色彩) -->
        <div
            class="absolute top-1/4 -right-20 w-[500px] h-[500px] bg-white/5 rounded-full filter blur-[110px] pointer-events-none animate-pulse z-10">
        </div>
        <div
            class="absolute bottom-1/3 -right-32 w-[450px] h-[450px] bg-slate-300/10 rounded-full filter blur-[100px] pointer-events-none z-10">
        </div>

        <!-- 动态天气滤镜层 -->
        <div id="weatherOverlay" class="absolute inset-0 bg-black/40 transition-colors duration-1000 z-20"></div>
        <!-- 物理粒子画布 -->
        <canvas id="weatherCanvas" class="absolute inset-0 z-30 pointer-events-none"></canvas>
    </div>

    <!-- 左上角：控制中心 -->
    <div class="absolute top-6 left-6 flex gap-4 z-30">
        <button onclick="toggleWallpaper()"
            class="w-10 h-10 glass rounded-full flex items-center justify-center hover:scale-110 active:scale-95 transition-all group shadow-lg outline-none focus:outline-none"
            title="切换壁纸">
            <svg class="w-5 h-5 text-white/70 group-hover:text-white" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                </path>
            </svg>
        </button>
        <button onclick="toggleWeatherFilter()" id="filterBtn"
            class="w-10 h-10 glass rounded-full flex items-center justify-center hover:scale-110 active:scale-95 transition-all group shadow-lg text-lg outline-none focus:outline-none"
            title="切换环境滤镜">✨</button>
    </div>

    <!-- 主体内容区 (左侧) -->
    <main
        class="relative z-10 flex flex-col items-center justify-center p-8 pb-20 w-full min-h-[80vh] md:flex-1 md:min-h-0">
        <!-- 时间与天气 -->
        <div class="flex flex-col items-center mb-10">
            <div id="clock"
                class="text-7xl font-semibold tracking-tight numeric drop-shadow-[0_4px_8px_rgba(0,0,0,0.6)]">00:00
            </div>
            <div
                class="flex items-center gap-3 text-white/90 text-sm mt-4 tracking-wider drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] font-medium">
                <span id="dateInfo">获取日期中...</span>
                <span class="opacity-40">|</span>
                <span id="weatherInfo">获取天气中...</span>
            </div>
        </div>

        <!-- 融合搜索框 (内嵌引擎选择) -->
        <div id="search-bar"
            class="w-full max-w-2xl bg-white/5 backdrop-blur-[40px] backdrop-saturate-150 backdrop-brightness-110 border border-white/20 rounded-full flex items-center p-1.5 pr-4 mb-12 transition-all duration-300 hover:scale-[1.01] focus-within:scale-[1.05] focus-within:ring-4 focus-within:ring-white/20 focus-within:bg-white/10 shadow-[inset_0_1px_1px_rgba(255,255,255,0.3),0_20px_50px_rgba(0,0,0,0.4)] overflow-hidden">
            <svg class="w-5 h-5 text-white/50 ml-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="在网络上搜索..."
                class="flex-1 min-w-0 bg-transparent border-none outline-none text-white px-4 text-base placeholder-white/60"
                onkeypress="handleSearch(event)">

            <!-- 内嵌引擎切换 -->
            <div class="flex gap-2 pr-1 shrink-0">
                <button onclick="setSearchEngine('bing')" id="eng-bing"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">必应</button>
                <button onclick="setSearchEngine('baidu')" id="eng-baidu"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">百度</button>
                <button onclick="setSearchEngine('google')" id="eng-google"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">谷歌</button>
                <button onclick="setSearchEngine('duck')" id="eng-duck"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">D</button>
            </div>
        </div>

        <!-- 快捷导航 Dock (去包装悬浮态) -->
        <div class="flex gap-10 px-4 py-4 w-full max-w-fit overflow-x-auto no-scrollbar">
            <a href="https://bilibili.com" target="_blank" rel="noopener noreferrer"
                class="flex flex-col items-center gap-3 group transition-all hover:-translate-y-2 shrink-0">
                <div
                    class="w-12 h-12 bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-2xl flex items-center justify-center group-hover:bg-[#FB7299] group-hover:text-white group-hover:border-transparent group-hover:scale-110 group-hover:shadow-[0_0_20px_rgba(251,114,153,0.4)] transition-all duration-300 shadow-lg">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M17.813 4.653h.854c1.51.054 2.769.578 3.773 1.574 1.004.995 1.524 2.249 1.56 3.76v7.36c-.036 1.51-.556 2.769-1.56 3.765-1.004.995-2.263 1.519-3.773 1.573H5.32c-1.51-.054-2.769-.578-3.773-1.573-1.004-.996-1.524-2.255-1.56-3.765V10c.036-1.511.556-2.765 1.56-3.76 1.004-.996 2.263-1.52 3.773-1.574h.774l-1.174-1.12a1.234 1.234 0 0 1-.373-.906c0-.356.124-.658.373-.907l.027-.027c.267-.249.573-.373.92-.373.347 0 .653.124.92.373L9.653 4.44c.071.071.134.142.187.213h4.267a.836.836 0 0 1 .16-.213l2.853-2.747c.267-.249.573-.373.92-.373.347 0 .662.124.946.373.285.249.427.551.427.907 0 .328-.124.63-.374.906l-1.227 1.147zM5 10v7.36c.007.622.231 1.14.671 1.554.44.413.965.626 1.574.639h13.507c.609-.013 1.134-.226 1.574-.639.44-.413.664-.932.671-1.554V10c-.007-.622-.231-1.14-.671-1.554-.44-.413-.965-.626-1.574-.639H7.245c-.609.013-1.134.226-1.574.639C5.231 8.86 5.007 9.378 5 10zm3.867 2.533c.373 0 .68.12.92.36.24.24.36.547.36.92 0 .373-.12.68-.36.92-.24.24-.547.36-.92.36-.373 0-.68-.12-.92-.36-.24-.24-.36-.547-.36-.92 0-.373.12-.68.36-.92.24-.24.547-.36.92-.36zm6.266 0c.374 0 .68.12.92.36.24.24.36.547.36.92 0 .373-.12.68-.36.92-.24.24-.546.36-.92.36-.373 0-.68-.12-.92-.36-.24-.24-.36-.547-.36-.92 0-.373.12-.68.36-.92.24-.24.546-.36.92-.36z" />
                    </svg>
                </div>
                <span
                    class="text-xs text-white/90 font-medium drop-shadow-md group-hover:text-white transition-colors">Bilibili</span>
            </a>
            <a href="https://x.com" target="_blank" rel="noopener noreferrer"
                class="flex flex-col items-center gap-3 group transition-all hover:-translate-y-2 shrink-0">
                <div
                    class="w-12 h-12 bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-2xl flex items-center justify-center group-hover:bg-black group-hover:text-white group-hover:border-transparent group-hover:scale-110 group-hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-all duration-300 shadow-lg">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M18.244 2.25h3.308l-7.227 7.719 8.502 11.281h-6.657l-5.213-6.817L4.99 21.25H1.68l7.73-8.235L1.25 2.25h6.826l4.704 6.217 5.464-6.217zM17.082 19.27h1.833L7.006 4.185H5.038L17.082 19.27z" />
                    </svg>
                </div>
                <span
                    class="text-xs text-white/90 font-medium drop-shadow-md group-hover:text-white transition-colors">Twitter</span>
            </a>
            <a href="https://github.com" target="_blank" rel="noopener noreferrer"
                class="flex flex-col items-center gap-3 group transition-all hover:-translate-y-2 shrink-0">
                <div
                    class="w-12 h-12 bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-2xl flex items-center justify-center group-hover:bg-[#333333] group-hover:text-white group-hover:border-transparent group-hover:scale-110 group-hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-all duration-300 shadow-lg">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 .297c-6.63 0-11.5 5.373-11.5 12 0 5.303 3.438 9.8 8.205 11.385.575.105.785-.25.785-.555 0-.27-.01-1.05-.015-2.06-3.197.69-3.872-1.54-3.872-1.54-.522-1.327-1.275-1.68-1.275-1.68-1.044-.712.08-.698.08-.698 1.155.08 1.762 1.185 1.762 1.185 1.026 1.758 2.646 1.25 3.29.956.104-.744.425-1.25.777-1.538-2.55-.29-5.23-1.275-5.23-5.677 0-1.253.448-2.277 1.183-3.077-.117-.29-.513-1.458.113-3.034 0 0 .964-.31 3.155 1.175a10.97 10.97 0 0 1 2.875-.387c.975.005 1.95.13 2.875.387 2.19-1.485 3.153-1.175 3.153-1.175.628 1.576.232 2.744.115 3.034.738.8 1.181 1.824 1.181 3.077 0 4.412-2.685 5.384-5.242 5.666.413.356.78 1.055.78 2.127 0 1.535-.014 2.774-.014 3.15 0 .308.21.665.793.548C18.563 22.092 22 17.592 22 12.297c0-6.627-4.87-12-11.5-12z" />
                    </svg>
                </div>
                <span
                    class="text-xs text-white/90 font-medium drop-shadow-md group-hover:text-white transition-colors">GitHub</span>
            </a>
            <a href="https://douyin.com" target="_blank" rel="noopener noreferrer"
                class="flex flex-col items-center gap-3 group transition-all hover:-translate-y-2 shrink-0">
                <div
                    class="w-12 h-12 bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-2xl flex items-center justify-center group-hover:bg-[#FE2C55] group-hover:text-white group-hover:border-transparent group-hover:scale-110 group-hover:shadow-[0_0_20px_rgba(254,44,85,0.4)] transition-all duration-300 font-bold shadow-lg">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.59-1.01V14.1c.01 2.32-.6 4.68-2.12 6.47-1.53 1.77-3.81 2.85-6.14 2.98-2.34.14-4.74-.5-6.53-2.31-1.8-1.82-2.43-4.46-2.1-6.97.31-2.5 1.89-4.73 4.13-5.86 1.37-.68 2.93-.96 4.44-.81V11.7c-1.67-.24-3.44.18-4.67 1.3-1.23 1.12-1.7 2.87-1.56 4.52.14 1.65 1.05 3.14 2.43 4.01 1.38.87 3.17 1.05 4.72.51 1.55-.54 2.78-1.89 3.14-3.49.12-.54.17-1.1.16-1.66V.02z" />
                    </svg>
                </div>
                <span
                    class="text-xs text-white/90 font-medium drop-shadow-md group-hover:text-white transition-colors">抖音</span>
            </a>
            <a href="https://discord.com" target="_blank" rel="noopener noreferrer"
                class="flex flex-col items-center gap-3 group transition-all hover:-translate-y-2 shrink-0">
                <div
                    class="w-12 h-12 bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-2xl flex items-center justify-center group-hover:bg-[#5865F2] group-hover:text-white group-hover:border-transparent group-hover:scale-110 group-hover:shadow-[0_0_20px_rgba(88,101,242,0.4)] transition-all duration-300 font-bold shadow-lg">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.736 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.077 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.419-2.157 2.419z" />
                    </svg>
                </div>
                <span
                    class="text-xs text-white/90 font-medium drop-shadow-md group-hover:text-white transition-colors">Discord</span>
            </a>
        </div>
    </main>

    <!-- 右侧：金融快讯面板 -->
    <aside class="relative z-10 w-full p-6 flex flex-col group/aside md:w-[450px] md:h-screen">
        <!-- 拖拽手柄 -->
        <div id="resizer"
            class="hidden md:block absolute left-0 top-0 w-1.5 h-full cursor-ew-resize z-20 hover:bg-white/30 transition-colors group-hover/aside:bg-white/10">
        </div>

        <div id="news-panel"
            class="bg-white/5 backdrop-blur-[40px] backdrop-saturate-150 backdrop-brightness-110 border border-white/20 flex-1 rounded-3xl p-6 flex flex-col overflow-hidden relative shadow-[inset_0_1px_1px_rgba(255,255,255,0.3),0_25px_50px_rgba(0,0,0,0.5)]">
            <!-- 标题栏 -->
            <div class="flex items-center justify-between mb-4 border-b border-white/10 pb-4">
                <div class="flex items-center gap-3">
                    <h2 class="text-lg font-bold tracking-wider text-white/90">7x24 市场快讯</h2>
                    <div class="flex items-center gap-1 bg-white/5 p-0.5 rounded-md text-[10px] border border-white/5">
                        <button onclick="setFontSize('sm')" id="fs-sm"
                            class="px-2 py-0.5 rounded transition-all bg-white/20 text-white shadow-sm">小</button>
                        <button onclick="setFontSize('base')" id="fs-base"
                            class="px-2 py-0.5 rounded transition-all text-white/50 hover:text-white/90">中</button>
                        <button onclick="setFontSize('lg')" id="fs-lg"
                            class="px-2 py-0.5 rounded transition-all text-white/50 hover:text-white/90">大</button>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span id="lastUpdateTime" class="text-[10px] numeric text-white/40">更新中...</span>
                    <div id="heartbeatStatus" class="flex items-center gap-1.5">
                        <span id="statusText" class="text-[10px] font-bold text-green-400">LIVE</span>
                        <span class="relative flex h-2 w-2">
                            <span id="statusPing"
                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span id="statusDot" class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- 选项卡切换 -->
            <div
                class="flex p-1 mb-4 bg-black/20 rounded-xl border border-white/5 backdrop-blur-md overflow-x-auto no-scrollbar">
                <button onclick="setFilter('all')" id="tab-all"
                    class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-all duration-300 bg-white/20 text-white shadow-lg shrink-0 min-w-[60px] scale-[1.02] border border-white/20">全部</button>
                <button onclick="setFilter('news')" id="tab-news"
                    class="flex-1 py-1.5 text-xs font-medium rounded-lg transition-all duration-300 text-white/40 hover:text-white/70 hover:bg-white/10 shrink-0 min-w-[60px]">快讯</button>
                <button onclick="setFilter('foreign')" id="tab-foreign"
                    class="flex-1 py-1.5 text-xs font-medium rounded-lg transition-all duration-300 text-white/40 hover:text-white/70 hover:bg-white/10 shrink-0 min-w-[60px]">外媒</button>
                <button onclick="setFilter('english')" id="tab-english"
                    class="flex-1 py-1.5 text-xs font-medium rounded-lg transition-all duration-300 text-white/40 hover:text-white/70 hover:bg-white/10 shrink-0 min-w-[60px]">英文</button>
            </div>

            <!-- 滚动列表区 (增加 pb-24 防止被底部行情条挡住) -->
            <div id="newsList"
                class="flex-1 overflow-y-auto no-scrollbar flex flex-col pb-24 transition-opacity duration-300">
                <!-- 由 JS 填充 -->
            </div>

            <!-- 回到顶部按钮 -->
            <div id="backToTop" onclick="scrollToTop()"
                class="absolute bottom-16 right-6 z-40 w-10 h-10 bg-white/10 backdrop-blur-xl rounded-full flex items-center justify-center cursor-pointer opacity-0 pointer-events-none transition-all duration-300 hover:bg-white/20 active:scale-95 shadow-xl border border-white/20">
                <svg class="w-5 h-5 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18">
                    </path>
                </svg>
            </div>
        </div>
    </aside>

    <!-- 底部：实时行情条 (静态双行滑动布局) -->
    <footer id="bottom-ticker"
        class="fixed bottom-0 left-0 w-full h-[48px] z-50 bg-white/5 bg-gradient-to-t from-black/50 to-transparent backdrop-blur-[40px] backdrop-saturate-150 backdrop-brightness-110 border-t border-white/20 shadow-[inset_0_1px_1px_rgba(255,255,255,0.2)] group/ticker">

        <!-- 修复后的翻页按钮：左 -->
        <button onclick="scrollTicker(-500)"
            class="absolute left-2 top-1/2 -translate-y-1/2 z-50 w-8 h-8 bg-black/50 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center opacity-0 group-hover/ticker:opacity-100 transition-all hover:bg-white/20 outline-none shadow-lg">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
        </button>

        <!-- 真正的横向滚动容器 -->
        <div id="tickerScroll"
            class="flex items-center gap-12 px-14 py-1.5 w-full h-full overflow-x-auto no-scrollbar scroll-smooth">
            <div id="tickerContent" class="flex items-center gap-14 min-w-max">
                <!-- 由 JS 填充双行排版 -->
            </div>
        </div>

        <!-- 修复后的翻页按钮：右 -->
        <button onclick="scrollTicker(500)"
            class="absolute right-2 top-1/2 -translate-y-1/2 z-50 w-8 h-8 bg-black/50 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center opacity-0 group-hover/ticker:opacity-100 transition-all hover:bg-white/20 outline-none shadow-lg">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
        </button>
    </footer>

    <script>
        // ================== 1. 基础 UI 控制 ==================

        // 实时时钟
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            // 完美处理日期和星期的空格
            document.getElementById('dateInfo').innerText = dateStr.replace(/(日)\s*(星期)/, '$1 $2');
        }
        setInterval(updateClock, 1000); updateClock();

        // 搜索引擎
        let currentEngine = localStorage.getItem('preferredEngine') || 'bing';
        const engines = {
            bing: { name: '必应', url: 'https://www.bing.com/search?q=', color: '#00809D' },
            baidu: { name: '百度', url: 'https://www.baidu.com/s?wd=', color: '#2932E1' },
            google: { name: '谷歌', url: 'https://www.google.com/search?q=', color: '#EA4335' },
            duck: { name: 'Duck', url: 'https://duckduckgo.com/?q=', color: '#DE5833' }
        };
        function setSearchEngine(engine) {
            currentEngine = engine; localStorage.setItem('preferredEngine', engine);
            document.getElementById('searchInput').placeholder = `在 ${engines[engine].name} 上搜索...`;
            Object.keys(engines).forEach(key => {
                const btn = document.getElementById('eng-' + key);
                if (key === engine) {
                    btn.style.color = engines[key].color;
                    btn.className = 'px-3 py-1 rounded-full bg-white/20 text-white font-bold shadow-lg transition-all shrink-0 scale-105 border border-white/20';
                } else {
                    btn.style.color = '';
                    btn.className = 'px-3 py-1 rounded-full text-white/60 hover:text-white transition-all shrink-0 hover:bg-white/10';
                }
            });
        }
        setSearchEngine(currentEngine);
        function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('searchInput').value.trim();
                if (query) window.open(engines[currentEngine].url + encodeURIComponent(query), '_blank');
            }
        }

        // 壁纸轮换
        let currentBgIndex = 0;
        function toggleWallpaper() {
            currentBgIndex = (currentBgIndex + 1) % 3;
            const bgImg = document.getElementById('bgImage');
            bgImg.style.opacity = '0';
            setTimeout(() => { bgImg.src = `bg_${currentBgIndex}.jpg?t=${Date.now()}`; bgImg.style.opacity = '1'; }, 400);
        }

        // 行情条翻页逻辑 (AI漏掉的函数，已补全)
        function scrollTicker(amount) {
            document.getElementById('tickerScroll').scrollBy({ left: amount, behavior: 'smooth' });
        }


        // ================== 2. 天气与粒子物理引擎 ==================

        const canvas = document.getElementById('weatherCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;
        let uiBounds = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            updateUIBounds();
        }

        function updateUIBounds() {
            const bar = document.getElementById('search-bar');
            const panel = document.getElementById('news-panel');
            const ticker = document.getElementById('bottom-ticker');
            uiBounds = [];
            if (bar) uiBounds.push(bar.getBoundingClientRect());
            if (panel) uiBounds.push(panel.getBoundingClientRect());
            if (ticker) uiBounds.push(ticker.getBoundingClientRect());
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class WeatherParticle {
            constructor(type) { this.type = type; this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * (canvas.height + 100) - canvas.height;
                this.isLanded = false;
                this.landedTime = 0;
                this.isSplashing = false;
                this.splashRadius = 0;
                this.splashAlpha = 1;

                if (this.type === 'rain') {
                    this.speed = 22 + Math.random() * 10;
                    this.len = 15 + Math.random() * 15;
                    this.opacity = 0.15 + Math.random() * 0.2;
                    this.lineWidth = 0.5 + Math.random() * 0.5;
                } else {
                    this.speed = 0.6 + Math.random() * 1.8;
                    this.radius = Math.random() * 3 + 1;
                    this.opacity = 0.4 + Math.random() * 0.4;
                    this.swing = Math.random() * 2;
                    this.swingStep = Math.random() * 100;
                }
            }
            update() {
                // 积雪逻辑
                if (this.isLanded) {
                    this.landedTime++;
                    if (this.landedTime > 1500 + Math.random() * 900) { // 延长积雪停留时间
                        this.opacity -= 0.002; // 降低融化速度
                        if (this.opacity <= 0) this.reset();
                    }
                    return;
                }

                // 雨滴飞溅逻辑 (微型快速水花)
                if (this.isSplashing) {
                    this.splashRadius += 1.2;
                    this.splashAlpha -= 0.08; // 约 12 帧消失
                    if (this.splashAlpha <= 0) this.reset();
                    return;
                }

                this.y += this.speed;
                if (this.type === 'snow') {
                    this.x += Math.sin(this.swingStep) * this.swing;
                    this.swingStep += 0.02;
                }

                // 物理碰撞检测 (向内收缩 20px 以适配圆角，实时 uiBounds 在 animateWeather 中更新)
                for (const bound of uiBounds) {
                    if (this.x > bound.left + 20 && this.x < bound.right - 20 && this.y > bound.top && this.y < bound.top + 15) {
                        if (this.type === 'snow') {
                            this.isLanded = true;
                            this.y = bound.top;
                        } else {
                            this.isSplashing = true;
                            this.splashRadius = 1;
                            this.splashAlpha = 0.6;
                        }
                        return;
                    }
                }

                if (this.y > canvas.height + 50) this.reset();
            }
            draw() {
                if (this.isLanded) {
                    ctx.beginPath();
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.ellipse(this.x, this.y, this.radius * 2, this.radius * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();
                    return;
                }

                if (this.isSplashing) {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(255, 255, 255, ${this.splashAlpha})`;
                    ctx.lineWidth = 0.8;
                    const r = Math.min(this.splashRadius, 15); // 限制水花大小
                    ctx.ellipse(this.x, this.y, r, r * 0.3, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    return;
                }

                ctx.beginPath();
                if (this.type === 'rain') {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.lineWidth = this.lineWidth;
                    ctx.moveTo(this.x, this.y); ctx.lineTo(this.x, this.y + this.len);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function animateWeather() {
            updateUIBounds(); // 实时更新 UI 坐标，适配面板拖拽
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            animationId = requestAnimationFrame(animateWeather);
        }

        function applyEnvironmentFilter(weatherKeyword) {
            const overlay = document.getElementById('weatherOverlay');
            cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];

            if (weatherKeyword.includes('🌧️') || weatherKeyword.includes('雨')) {
                overlay.className = "absolute inset-0 bg-blue-900/30 transition-colors duration-1000 z-20";
                for (let i = 0; i < 120; i++) particles.push(new WeatherParticle('rain'));
                animateWeather();
            } else if (weatherKeyword.includes('☀️') || weatherKeyword.includes('晴')) {
                overlay.className = "absolute inset-0 bg-orange-700/20 mix-blend-overlay transition-colors duration-1000 z-20";
            } else if (weatherKeyword.includes('❄️') || weatherKeyword.includes('雪')) {
                overlay.className = "absolute inset-0 bg-slate-800/40 transition-colors duration-1000 z-20";
                for (let i = 0; i < 150; i++) particles.push(new WeatherParticle('snow'));
                animateWeather();
            } else {
                overlay.className = "absolute inset-0 bg-black/30 transition-colors duration-1000 z-20";
            }
        }

        let realWeather = '';
        const filterModes = ['auto', '晴', '雨', '雪'];
        const filterIcons = ['✨', '☀️', '🌧️', '❄️'];
        let currentFilterIndex = 0;

        function toggleWeatherFilter() {
            currentFilterIndex = (currentFilterIndex + 1) % 4;
            const mode = filterModes[currentFilterIndex];
            document.getElementById('filterBtn').innerText = filterIcons[currentFilterIndex];
            if (mode === 'auto') applyEnvironmentFilter(realWeather);
            else applyEnvironmentFilter(mode);
        }

        async function fetchWeather() {
            try {
                const response = await fetch('./weather.txt?t=' + Date.now());
                if (!response.ok) throw new Error();
                const text = await response.text();
                if (!text.includes('失败')) {
                    realWeather = text;
                    document.getElementById('weatherInfo').innerText = text;
                    if (filterModes[currentFilterIndex] === 'auto') applyEnvironmentFilter(realWeather);
                }
            } catch { document.getElementById('weatherInfo').innerText = '暂无天气数据'; }
        }
        fetchWeather(); setInterval(fetchWeather, 600000);

        // ================== 3. 底部行情双行排版 ==================

        async function fetchTickerData() {
            try {
                const response = await fetch('./ticker.json?t=' + Date.now());
                const items = await response.json();
                const container = document.getElementById('tickerContent');
                if (!items || items.length === 0) return;

                if (container.children.length === 0) {
                    let html = '';
                    items.forEach(item => {
                        html += `
                        <div class="flex flex-col items-center justify-center min-w-max gap-0.5" data-symbol="${item.name}">
                            <span class="text-[10px] text-white/60 tracking-wider drop-shadow-md">${item.name}</span>
                            <div class="flex items-baseline gap-1.5">
                                <span class="text-xs font-bold text-white drop-shadow-md numeric price-val">--</span>
                                <span class="text-[10px] font-semibold drop-shadow-md numeric change-val">--</span>
                            </div>
                        </div>`;
                    });
                    container.innerHTML = html;
                }

                items.forEach(item => {
                    const el = container.querySelector(`[data-symbol="${item.name}"]`);
                    if (el) {
                        el.querySelector('.price-val').innerText = item.price;
                        const cEl = el.querySelector('.change-val');
                        cEl.innerText = item.change;
                        cEl.className = `text-[10px] font-semibold drop-shadow-md numeric change-val ${item.change.startsWith('-') ? 'text-emerald-400' : 'text-rose-400'}`;
                    }
                });
            } catch { console.error("行情同步异常"); }
        }
        fetchTickerData(); setInterval(fetchTickerData, 15000);

        // ================== 4. 新闻流与交互防抖 ==================

        let allNewsData = [];
        let currentFilter = 'all';
        let lastFirstNewsContent = '';
        let currentFontSize = 'sm';

        // 字体切换
        function setFontSize(size) {
            currentFontSize = size;
            ['sm', 'base', 'lg'].forEach(s => {
                const btn = document.getElementById('fs-' + s);
                if (s === size) { btn.classList.add('bg-white/20', 'text-white'); btn.classList.remove('text-white/50'); }
                else { btn.classList.remove('bg-white/20', 'text-white'); btn.classList.add('text-white/50'); }
            });
            // 字体改变时，强制全量重绘
            lastFirstNewsContent = '';
            fetchRealNews();
        }

        // 极致排版的单条新闻渲染 (修复间距过大，增加极细分割线)
        function createNewsElement(news, isNew = false) {
            let displayText = news.content.replace('【新浪】', '');

            // XSS 消毒：使用临时 div 转义
            const tempDiv = document.createElement('div');
            tempDiv.textContent = displayText;
            let safeText = tempDiv.innerHTML;

            // 高亮处理
            let highlightedHtml = safeText
                .replace(/涨|创历史新高|超预期/g, '<span class="text-red-400 font-bold">$&</span>')
                .replace(/跌|跳水|不及预期|走弱|大跌/g, '<span class="text-green-400 font-bold">$&</span>');

            // 安全外链 rel="noopener noreferrer"
            let contentHtml = news.url ? `<a href="${news.url}" target="_blank" rel="noopener noreferrer" class="text-blue-400 visited:text-purple-300/80 hover:text-blue-300 hover:underline transition-colors underline-offset-4">${highlightedHtml}</a>` : highlightedHtml;

            const fs = currentFontSize === 'sm' ? 'text-sm' : (currentFontSize === 'base' ? 'text-base' : 'text-lg');
            const item = document.createElement('div');

            // 重要性标记
            let importantTag = news.is_important ? `<span class="ml-2 px-1.5 py-0.5 bg-red-500/20 text-red-400 text-[9px] font-bold rounded border border-red-500/30 animate-pulse">🔥 重大</span>` : '';
            let importantClass = news.is_important ? ' bg-red-500/10 border-red-500/20' : ' border-white/20';

            // 黄金间距：pb-3 mb-3，而不是之前的 pb-4 mb-4。最后一条去掉分割线。
            item.className = `border-l-2 ${importantClass} pl-3 border-b border-white/5 pb-3 mb-3 last:border-b-0 last:mb-0 last:pb-0 news-item-hover` + (isNew ? ' animate-slide-down' : '');

            item.innerHTML = `<div class="text-[11px] text-white/40 font-mono mb-0.5 flex items-center">${news.time}${importantTag}</div><div class="${fs} leading-relaxed text-white/90 drop-shadow-sm">${contentHtml}</div>`;
            return item;
        }

        // 分类过滤规则
        function applyFilter(n) {
            const c = n.content;
            if (currentFilter === 'news') return c.includes('【新浪】');
            if (currentFilter === 'foreign') return ['【华尔街日报】', '【FT中文网】', '【纽约时报】', '【BBC】', '【联合早报】'].some(s => c.includes(s));
            if (currentFilter === 'english') return ['【Yahoo】', '【CNBC】', '【FT】'].some(s => c.includes(s));
            return true;
        }

        // 切换分类 Tab
        function setFilter(filter) {
            currentFilter = filter;
            ['all', 'news', 'foreign', 'english'].forEach(t => {
                const btn = document.getElementById('tab-' + t);
                if (t === filter) {
                    btn.className = 'flex-1 py-1.5 text-xs font-bold rounded-lg transition-all duration-300 bg-white/20 text-white shadow-lg shrink-0 min-w-[60px] scale-[1.02] border border-white/20';
                } else {
                    btn.className = 'flex-1 py-1.5 text-xs font-medium rounded-lg transition-all duration-300 text-white/40 hover:text-white/70 hover:bg-white/10 shrink-0 min-w-[60px]';
                }
            });
            // 切换分类时，强制全量重绘
            lastFirstNewsContent = '';
            fetchRealNews();
        }

        async function fetchRealNews() {
            try {
                const response = await fetch('./finance-news.json?t=' + Date.now());
                const data = await response.json();

                // 心跳监测逻辑 (使用后端的 last_updated)
                const statusText = document.getElementById('statusText');
                const statusPing = document.getElementById('statusPing');
                const statusDot = document.getElementById('statusDot');

                if (data && data.last_updated) {
                    const lastUpdatedMs = data.last_updated * 1000;
                    const diffMinutes = (Date.now() - lastUpdatedMs) / 60000;

                    if (diffMinutes <= 3) {
                        statusText.innerText = 'LIVE';
                        statusText.className = 'text-[10px] font-bold text-green-400';
                        statusPing.className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75';
                        statusDot.className = 'relative inline-flex rounded-full h-2 w-2 bg-green-500';
                    } else {
                        statusText.innerText = '离线';
                        statusText.className = 'text-[10px] font-bold text-red-400';
                        statusPing.className = 'hidden';
                        statusDot.className = 'relative inline-flex rounded-full h-2 w-2 bg-red-500';
                    }
                }

                const newsList = data.news_list;
                if (!newsList || newsList.length === 0) return;

                const listContainer = document.getElementById('newsList');

                // 场景 A: 全量渲染 (首次打开 / 切换Tab / 切换字体)
                if (lastFirstNewsContent === '') {
                    allNewsData = newsList;
                    const filtered = allNewsData.filter(applyFilter);

                    // 淡出动画过渡
                    listContainer.style.opacity = '0';
                    setTimeout(() => {
                        listContainer.innerHTML = '';
                        if (filtered.length === 0) {
                            listContainer.innerHTML = '<div class="text-center text-white/30 mt-10 text-sm">暂无对应快讯</div>';
                        } else {
                            filtered.forEach(n => listContainer.appendChild(createNewsElement(n)));
                        }
                        listContainer.style.opacity = '1';
                    }, 200); // 配合 CSS transition-opacity

                    lastFirstNewsContent = newsList[0].content;
                    document.getElementById('lastUpdateTime').innerText = `${newsList[0].time}`;
                    return;
                }

                // 场景 B: 增量检测防抖动
                if (newsList[0].content !== lastFirstNewsContent) {
                    const newItems = [];
                    for (let n of newsList) {
                        if (n.content === lastFirstNewsContent) break;
                        if (applyFilter(n)) newItems.push(n);
                    }

                    if (newItems.length > 0) {
                        // 记录滚动位置，防止阅读时画面乱跳
                        const currentScroll = listContainer.scrollTop;
                        const oldHeight = listContainer.scrollHeight;

                        newItems.reverse().forEach(n => {
                            listContainer.prepend(createNewsElement(n, true));
                        });

                        // 如果用户不在最顶部，补偿滚动高度
                        if (currentScroll > 10) {
                            listContainer.scrollTop = currentScroll + (listContainer.scrollHeight - oldHeight);
                        }
                    }
                    lastFirstNewsContent = newsList[0].content;
                    allNewsData = newsList;
                    document.getElementById('lastUpdateTime').innerText = `${newsList[0].time}`;
                }
            } catch (e) {
                console.error("快讯同步失败:", e);
                document.getElementById('statusText').innerText = '断连';
                document.getElementById('statusText').className = 'text-[10px] font-bold text-red-400';
                document.getElementById('statusPing').className = 'hidden';
                document.getElementById('statusDot').className = 'relative inline-flex rounded-full h-2 w-2 bg-red-500';
            }
        }

        // ================== 5. 辅助交互与快捷键 ==================

        // 全局快捷键监听
        window.addEventListener('keydown', (e) => {
            const searchInput = document.getElementById('searchInput');
            // 一键聚焦搜索框 ( / 键 )
            if (e.key === '/' && document.activeElement !== searchInput && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                e.preventDefault();
                searchInput.focus();
            }
            // 一键清空并退出搜索 ( Esc 键 )
            if (e.key === 'Escape' && document.activeElement === searchInput) {
                searchInput.value = '';
                searchInput.blur();
            }
        });

        // 回到顶部悬浮按钮
        const newsListEl = document.getElementById('newsList');
        const bttBtn = document.getElementById('backToTop');
        newsListEl.addEventListener('scroll', () => {
            if (newsListEl.scrollTop > 300) { bttBtn.classList.remove('opacity-0', 'pointer-events-none'); bttBtn.classList.add('opacity-100'); }
            else { bttBtn.classList.add('opacity-0', 'pointer-events-none'); bttBtn.classList.remove('opacity-100'); }
        });
        function scrollToTop() { newsListEl.scrollTo({ top: 0, behavior: 'smooth' }); }

        // 侧边栏拖拽拉伸
        const aside = document.querySelector('aside');
        const resizer = document.getElementById('resizer');
        let isResizing = false;

        // 初始化加载宽度
        const savedWidth = localStorage.getItem('newsPanelWidth');
        if (savedWidth && window.innerWidth >= 768) {
            aside.style.width = `${savedWidth}px`;
        }

        resizer.addEventListener('mousedown', () => { if (window.innerWidth < 768) return; isResizing = true; document.body.style.cursor = 'ew-resize'; aside.classList.add('select-none'); });
        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const newWidth = window.innerWidth - e.clientX;
            if (newWidth >= 350 && newWidth <= window.innerWidth * 0.6) {
                aside.style.width = `${newWidth}px`;
            }
        });
        window.addEventListener('mouseup', () => {
            if (isResizing) {
                localStorage.setItem('newsPanelWidth', aside.offsetWidth);
            }
            isResizing = false;
            document.body.style.cursor = 'default';
            aside.classList.remove('select-none');
        });

        // 初始拉取快讯
        fetchRealNews(); setInterval(fetchRealNews, 10000);
    </script>
</body>
