<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vibe Workspace</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <!-- 字体：本地自托管 Inter（正文）+ JetBrains Mono（数字），仅含 latin/latin-ext 子集 -->
    <link rel="stylesheet" href="./fonts/fonts.css">
    <!-- Tailwind：静态预编译产物（由 `npm run build:css` 生成，替代旧的 407KB 浏览器端运行时）。
         改动 class 后需重新构建。DOMPurify 仍用于 XSS 消毒。 -->
    <link rel="stylesheet" href="./vendor/app.css">
    <script src="./vendor/purify.min.js"></script>
    <style>
        body {
            font-family: "Inter", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .numeric {
            font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", "Liberation Mono", "Menlo", monospace;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1, "cv01" 1;
        }

        /* 时钟：更紧的字距 + 轻微的光学间距 */
        #clock {
            font-feature-settings: "tnum" 1, "ss01" 1;
            letter-spacing: -0.02em;
        }

        /* 核心：毛玻璃质感 —— 通透水晶感而非磨砂塑料 */
        .glass {
            background: rgba(255, 255, 255, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        @supports (backdrop-filter: blur(12px)) or (-webkit-backdrop-filter: blur(12px)) {
            .glass {
                background: rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(16px) saturate(160%);
                -webkit-backdrop-filter: blur(16px) saturate(160%);
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.35),
                    inset 0 -1px 0 rgba(255, 255, 255, 0.06),
                    0 8px 32px rgba(0, 0, 0, 0.28);
            }
        }

        /* 大面板统一玻璃质感：降模糊提通透 + 高光描边 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.28),
                inset 0 0 0 1px rgba(255, 255, 255, 0.03),
                0 24px 50px rgba(0, 0, 0, 0.45);
        }

        /* 真·玻璃折射：仅在 JS 检测到浏览器支持 url() backdrop-filter 时启用（加 .glass-refract）。
           不支持（如 Safari）则保持上面的纯模糊，无副作用。 */
        html.glass-refract .glass-panel {
            backdrop-filter: blur(20px) saturate(150%) url(#glassDisplace);
        }

        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 进场动画 */
        @keyframes slideDown {
            0% {
                opacity: 0;
                transform: translateY(-26px) scale(0.97);
                background: rgba(56, 189, 248, 0.22);
                box-shadow: inset 3px 0 0 rgba(56, 189, 248, 0.9);
            }
            55% {
                opacity: 1;
                transform: translateY(0) scale(1);
                background: rgba(56, 189, 248, 0.16);
                box-shadow: inset 3px 0 0 rgba(56, 189, 248, 0.7);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                background: rgba(56, 189, 248, 0);
                box-shadow: inset 3px 0 0 rgba(56, 189, 248, 0);
            }
        }

        .animate-slide-down {
            animation: slideDown 1.25s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            border-radius: 0.4rem;
        }

        @keyframes subtleGlow {
            from {
                background: rgba(250, 204, 21, 0.14);
            }

            to {
                background: rgba(250, 204, 21, 0);
            }
        }

        .tab-btn {
            color: rgba(255, 255, 255, 0.52);
            transition: all 0.25s ease;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.92);
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-btn-active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), 0 10px 20px rgba(0, 0, 0, 0.22);
        }

        /* 新闻项悬停优化 */
        .news-item-hover {
            transition: background 0.2s ease, box-shadow 0.2s ease;
            border-radius: 0.5rem;
        }

        .news-item-hover:hover {
            background: rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        /* 科技聚合块样式适配 */
        .tech-content br {
            display: block;
            margin-top: 0.5rem;
            content: "";
        }

        .tech-content a {
            color: #7dd3fc !important;
            text-decoration: underline;
            text-decoration-color: rgba(125, 211, 252, 0.55);
            text-underline-offset: 0.18em;
            text-shadow: 0 1px 10px rgba(8, 47, 73, 0.3);
            transition: color 0.2s ease, text-decoration-color 0.2s ease, background-color 0.2s ease;
            border-radius: 0.35rem;
            padding: 0 0.1rem;
            background: linear-gradient(180deg, rgba(8, 47, 73, 0.14), rgba(8, 47, 73, 0.02));
        }

        .tech-content a:hover {
            color: #e0f2fe !important;
            text-decoration-color: rgba(224, 242, 254, 0.9);
            background: linear-gradient(180deg, rgba(8, 47, 73, 0.22), rgba(8, 47, 73, 0.08));
        }

        .news-link {
            color: #7dd3fc;
            text-decoration: underline;
            text-decoration-color: rgba(125, 211, 252, 0.55);
            text-underline-offset: 0.18em;
            text-shadow: 0 1px 10px rgba(8, 47, 73, 0.3);
            transition: color 0.2s ease, text-decoration-color 0.2s ease, background-color 0.2s ease;
            border-radius: 0.35rem;
            padding: 0 0.1rem;
            background: linear-gradient(180deg, rgba(8, 47, 73, 0.14), rgba(8, 47, 73, 0.02));
        }

        .news-link:hover {
            color: #bae6fd;
            text-decoration-color: rgba(186, 230, 253, 0.9);
            background: linear-gradient(180deg, rgba(8, 47, 73, 0.22), rgba(8, 47, 73, 0.08));
        }

        /* 骨架屏动画 */
        @keyframes shimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.04) 75%);
            background-size: 400px 100%;
            animation: shimmer 1.8s infinite linear;
            border-radius: 0.375rem;
        }
        .skeleton-line { height: 0.75rem; margin-bottom: 0.5rem; }
        .skeleton-line-sm { height: 0.5rem; width: 40%; margin-bottom: 0.75rem; }

        /* sparkline */
        .sparkline-svg { display: block; overflow: visible; }
        .sparkline-poly { fill: none; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
        /* sparkline 画入：沿线描绘动画 */
        .sparkline-poly.draw-in {
            stroke-dasharray: var(--spark-len, 120);
            stroke-dashoffset: var(--spark-len, 120);
            animation: sparkDraw 0.9s ease-out forwards;
        }
        @keyframes sparkDraw { to { stroke-dashoffset: 0; } }

        /* ============ 进场错峰动画 ============ */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        [data-enter] { opacity: 0; will-change: transform, opacity; }
        [data-enter].entered {
            animation: fadeUp 0.62s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            animation-delay: var(--enter-delay, 0s);
        }

        /* ============ 玻璃面板鼠标光斑 ============ */
        .glass-spot { position: relative; }
        .glass-spot::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(260px circle at var(--mx, 50%) var(--my, -40%),
                        rgba(255, 255, 255, 0.22), transparent 62%);
            opacity: var(--spot, 0);
            transition: opacity 0.4s ease;
            pointer-events: none;
            mix-blend-mode: soft-light;
            z-index: 3;
        }

        /* ============ Dock 磁吸：交由 JS 驱动 transform，仅设过渡 ============ */
        .dock-ico {
            transition: transform 0.18s cubic-bezier(0.22, 0.61, 0.36, 1),
                        background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            transform-origin: center center;
            will-change: transform;
        }

        /* ============ 时段自适应色调层 ============ */
        #timeTint {
            position: absolute;
            inset: 0;
            pointer-events: none;
            mix-blend-mode: soft-light;
            opacity: 0;
            transition: background 2s ease, opacity 2s ease;
            z-index: 15;
        }

        /* ============ 雷暴闪电 ============ */
        #lightningFlash {
            background: rgba(225, 238, 255, 0.9);
        }
        #lightningFlash.flash { animation: lightningFlash 0.9s ease-out; }
        @keyframes lightningFlash {
            0%   { opacity: 0; }
            4%   { opacity: 0.55; }
            8%   { opacity: 0.12; }
            12%  { opacity: 0.68; }
            22%  { opacity: 0; }
            100% { opacity: 0; }
        }

        /* ============ 晴天光束光晕 ============ */
        #sunGlow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.6s ease;
            z-index: 14;
            background:
                radial-gradient(circle at 82% 14%, rgba(255, 244, 214, 0.5), rgba(255, 244, 214, 0) 38%),
                conic-gradient(from 150deg at 82% 14%, rgba(255, 240, 200, 0) 0deg,
                    rgba(255, 238, 196, 0.16) 30deg, rgba(255, 240, 200, 0) 70deg);
        }
        #sunGlow.on { opacity: 1; }
        @media (prefers-reduced-motion: reduce) {
            [data-enter].entered { animation: none; opacity: 1; }
            .sparkline-poly.draw-in { animation: none; stroke-dashoffset: 0; }
            #tabIndicator { transition: none; }
        }

        /* 分类 Tab：默认淡，激活态由 JS 配合滑动指示器染强调色 */
        .tab-btn { color: rgba(255,255,255,0.42); font-weight: 500; }
        .tab-btn:hover { color: rgba(255,255,255,0.72); }
        .tab-btn.active { color: #fff; font-weight: 700; }
        .tab-badge {
            font-size: 9px; line-height: 1; padding: 2px 5px; border-radius: 9999px;
            background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6);
            font-variant-numeric: tabular-nums; transition: all .3s;
        }
        .tab-btn.active .tab-badge { background: rgba(255,255,255,0.22); color: #fff; }
        .tab-badge:empty { display: none; }
    </style>
</head>

<body
    class="min-h-screen w-screen text-white font-sans bg-gray-900 flex flex-col md:flex-row md:h-screen md:overflow-hidden overflow-y-auto no-scrollbar">

    <!-- 玻璃折射用 SVG 滤镜：feTurbulence 噪声 → feDisplacementMap 让背景透过玻璃微微扭曲流动。
         默认隐藏、不占布局；仅被支持 url() backdrop-filter 的浏览器引用（见 html.glass-refract）。 -->
    <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
        <filter id="glassDisplace" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.008 0.012" numOctaves="2" seed="7" result="noise">
                <animate attributeName="baseFrequency" dur="28s"
                    values="0.008 0.012;0.011 0.009;0.008 0.012" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="14"
                xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <!-- 动态背景 -->
    <div class="fixed inset-0 z-0">
        <img id="bgImage1" translate="no" src=""
            class="absolute inset-0 w-full h-full object-cover pointer-events-none select-none transition-opacity duration-1000 ease-in-out z-[1] opacity-0"
            alt="">
        <img id="bgImage2" translate="no" src=""
            class="absolute inset-0 w-full h-full object-cover pointer-events-none select-none transition-opacity duration-1000 ease-in-out z-[2] opacity-0"
            alt="">

        <!-- 自适应氛围光晕 (中性提亮，确保透过玻璃提取壁纸色彩) -->
        <div
            class="absolute top-1/4 -right-20 w-[500px] h-[500px] bg-white/5 rounded-full filter blur-[110px] pointer-events-none animate-pulse z-10">
        </div>
        <div
            class="absolute bottom-1/3 -right-32 w-[450px] h-[450px] bg-slate-300/10 rounded-full filter blur-[100px] pointer-events-none z-10">
        </div>

        <!-- 动态天气滤镜层 -->
        <div id="weatherOverlay" class="absolute inset-0 bg-black/40 transition-colors duration-1000 z-20"></div>

        <!-- 时段自适应色调（很淡，soft-light 叠色） -->
        <div id="timeTint"></div>
        <!-- 晴天柔和光束光晕 -->
        <div id="sunGlow"></div>
        <!-- 夜晚缓慢闪烁星空 -->
        <canvas id="starCanvas" class="absolute inset-0 pointer-events-none z-[13]" style="opacity:0;transition:opacity 1.6s ease;"></canvas>
    </div>

    <!-- 物理粒子画布：提到面板之上，雨雪/水流才能落在控件表面（不拦截交互） -->
    <canvas id="weatherCanvas" class="fixed inset-0 z-40 pointer-events-none"></canvas>

    <!-- 雷暴闪电泛光层（雨模式下偶发，不拦截交互） -->
    <div id="lightningFlash" class="fixed inset-0 z-[41] pointer-events-none opacity-0"></div>

    <!-- 左上角：控制中心 -->
    <div class="absolute top-6 left-6 flex gap-4 z-30">
        <button id="wallpaperBtn" onclick="toggleWallpaper()" style="opacity: 0.5; pointer-events: none;"
            class="w-10 h-10 glass rounded-full flex items-center justify-center hover:scale-110 active:scale-95 transition-all group shadow-lg outline-none focus:outline-none"
            title="切换壁纸" aria-label="切换壁纸">
            <svg class="w-5 h-5 text-white/70 group-hover:text-white" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                </path>
            </svg>
        </button>
        <button onclick="toggleWeatherFilter()" id="filterBtn"
            class="w-10 h-10 glass rounded-full flex items-center justify-center hover:scale-110 active:scale-95 transition-all group shadow-lg text-lg outline-none focus:outline-none"
            title="切换环境滤镜" aria-label="切换环境滤镜">✨</button>
    </div>

    <!-- 主体内容区 (左侧) -->
    <main
        class="relative z-10 flex flex-col items-center justify-center p-8 pb-20 w-full min-h-[80vh] md:flex-1 md:min-h-0">
        <!-- 时间与天气 -->
        <div class="flex flex-col items-center mb-10" data-enter style="--enter-delay:0.05s">
            <div id="clock"
                class="text-7xl font-semibold tracking-tight numeric drop-shadow-[0_4px_8px_rgba(0,0,0,0.6)]">00:00
            </div>
            <div
                class="flex items-center gap-3 text-white/90 text-sm mt-4 tracking-wider drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] font-medium">
                <span id="dateInfo">获取日期中...</span>
                <span class="opacity-40">|</span>
                <span id="weatherInfo">获取天气中...</span>
            </div>
        </div>

        <!-- 融合搜索框 (内嵌引擎选择) -->
        <div id="search-bar" data-enter style="--enter-delay:0.14s"
            class="glass-spot w-full max-w-2xl glass-panel rounded-full flex items-center p-1.5 pr-4 mb-12 transition-all duration-300 hover:scale-[1.01] focus-within:scale-[1.02] focus-within:ring-4 focus-within:ring-white/20 focus-within:bg-white/10 overflow-hidden">
            <svg class="w-5 h-5 text-white/50 ml-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="在网络上搜索..."
                class="flex-1 min-w-0 bg-transparent border-none outline-none text-white px-4 text-base placeholder-white/60"
                onkeydown="if(event.key==='Enter')handleSearch(event)">

            <!-- 内嵌引擎切换 -->
            <div class="flex gap-2 pr-1 shrink-0">
                <button onclick="setSearchEngine('bing')" id="eng-bing"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">必应</button>
                <button onclick="setSearchEngine('baidu')" id="eng-baidu"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">百度</button>
                <button onclick="setSearchEngine('google')" id="eng-google"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">谷歌</button>
                <button onclick="setSearchEngine('duck')" id="eng-duck"
                    class="px-3 py-1 rounded-full text-[11px] font-medium transition-all shrink-0">D</button>
            </div>
        </div>

        <!-- 快捷导航 Dock (去包装悬浮态) -->
        <div id="dockRow" data-enter style="--enter-delay:0.22s"
            class="flex gap-10 px-4 py-4 w-full max-w-fit overflow-x-auto no-scrollbar">
            <a href="https://bilibili.com" target="_blank" rel="noopener noreferrer"
                class="flex flex-col items-center gap-3 group transition-all hover:-translate-y-2 shrink-0">
                <div
                    class="dock-ico w-12 h-12 bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-2xl flex items-center justify-center group-hover:bg-[#FB7299] group-hover:text-white group-hover:border-transparent group-hover:scale-110 group-hover:shadow-[0_0_20px_rgba(251,114,153,0.4)] transition-all duration-300 shadow-lg">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M17.813 4.653h.854c1.51.054 2.769.578 3.773 1.574 1.004.995 1.524 2.249 1.56 3.76v7.36c-.036 1.51-.556 2.769-1.56 3.765-1.004.995-2.263 1.519-3.773 1.573H5.32c-1.51-.054-2.769-.578-3.773-1.573-1.004-.996-1.524-2.255-1.56-3.765V10c.036-1.511.556-2.765 1.56-3.76 1.004-.996 2.263-1.52 3.773-1.574h.774l-1.174-1.12a1.234 1.234 0 0 1-.373-.906c0-.356.124-.658.373-.907l.027-.027c.267-.249.573-.373.92-.373.347 0 .653.124.92.373L9.653 4.44c.071.071.134.142.187.213h4.267a.836.836 0 0 1 .16-.213l2.853-2.747c.267-.249.573-.373.92-.373.347 0 .662.124.946.373.285.249.427.551.427.907 0 .328-.124.63-.374.906l-1.227 1.147zM5 10v7.36c.007.622.231 1.14.671 1.554.44.413.965.626 1.574.639h13.507c.609-.013 1.134-.226 1.574-.639.44-.413.664-.932.671-1.554V10c-.007-.622-.231-1.14-.671-1.554-.44-.413-.965-.626-1.574-.639H7.245c-.609.013-1.134.226-1.574.639C5.231 8.86 5.007 9.378 5 10zm3.867 2.533c.373 0 .68.12.92.36.24.24.36.547.36.92 0 .373-.12.68-.36.92-.24.24-.547.36-.92.36-.373 0-.68-.12-.92-.36-.24-.24-.36-.547-.36-.92 0-.373.12-.68.36-.92.24-.24.547-.36.92-.36zm6.266 0c.374 0 .68.12.92.36.24.24.36.547.36.92 0 .373-.12.68-.36.92-.24.24-.546.36-.92.36-.373 0-.68-.12-.92-.36-.24-.24-.36-.547-.36-.92 0-.373.12-.68.36-.92.24-.24.546-.36.92-.36z" />
                    </svg>
                </div>
                <span
                    class="text-xs text-white/90 font-medium drop-shadow-md group-hover:text-white transition-colors">Bilibili</span>
            </a>
            <a href="https://x.com" target="_blank" rel="noopener noreferrer"
                class="flex flex-col items-center gap-3 group transition-all hover:-translate-y-2 shrink-0">
                <div
                    class="dock-ico w-12 h-12 bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-2xl flex items-center justify-center group-hover:bg-black group-hover:text-white group-hover:border-transparent group-hover:scale-110 group-hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-all duration-300 shadow-lg">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M18.244 2.25h3.308l-7.227 7.719 8.502 11.281h-6.657l-5.213-6.817L4.99 21.25H1.68l7.73-8.235L1.25 2.25h6.826l4.704 6.217 5.464-6.217zM17.082 19.27h1.833L7.006 4.185H5.038L17.082 19.27z" />
                    </svg>
                </div>
                <span
                    class="text-xs text-white/90 font-medium drop-shadow-md group-hover:text-white transition-colors">Twitter</span>
            </a>
            <a href="https://github.com" target="_blank" rel="noopener noreferrer"

    <script>
        // ================== 1. 壁纸收藏夹引擎 (动态加载) ==================
        let wallpapersArray = [];
        let currentBgIndex = 0;
        let activeBgLayer = 1;
        let isSwitchingBg = false;
        const vSuffix = new Date().toLocaleDateString('zh-CN');

        async function initWallpapers() {
            try {
                const resp = await fetch('./wallpapers.json?t=' + Date.now());
                wallpapersArray = await resp.json();
                if (wallpapersArray && wallpapersArray.length > 0) {
                    // 初始化第一张并预加载
                    const img1 = document.getElementById('bgImage1');
                    const img2 = document.getElementById('bgImage2');
                    const firstSrc = wallpapersArray[0] + '?v=' + vSuffix;
                    img1.onload = () => {
                        img1.classList.remove('opacity-0');
                        img1.classList.add('opacity-100');
                    };
                    img1.src = firstSrc;
                    img2.src = firstSrc;
                    if (wallpapersArray.length > 1) {
                        const nextImg = new Image();
                        nextImg.src = wallpapersArray[1] + '?v=' + vSuffix;
                    }
                    // 列表加载成功后激活切换按钮
                    const btn = document.getElementById('wallpaperBtn');
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                }
            } catch (e) {
                console.error("加载壁纸列表失败:", e);
            }
        }
        initWallpapers();

        // ================== 2. 基础 UI 控制 ==================

        // 实时时钟
        const clockEl = document.getElementById('clock');
        const dateInfoEl = document.getElementById('dateInfo');

        function updateClock() {
            const now = new Date();
            clockEl.innerText = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            // 完美处理日期和星期的空格
            dateInfoEl.innerText = dateStr.replace(/(日)\s*(星期)/, '$1 $2');
        }
        setInterval(updateClock, 1000); updateClock();

        // 搜索引擎
        let currentEngine = localStorage.getItem('preferredEngine') || 'bing';
        const engines = {
            bing: { name: '必应', url: 'https://www.bing.com/search?q=', color: '#00809D' },
            baidu: { name: '百度', url: 'https://www.baidu.com/s?wd=', color: '#2932E1' },
            google: { name: '谷歌', url: 'https://www.google.com/search?q=', color: '#EA4335' },
            duck: { name: 'Duck', url: 'https://duckduckgo.com/?q=', color: '#DE5833' }
        };
        function setSearchEngine(engine) {
            currentEngine = engine; localStorage.setItem('preferredEngine', engine);
            document.getElementById('searchInput').placeholder = `在 ${engines[engine].name} 上搜索...`;
            Object.keys(engines).forEach(key => {
                const btn = document.getElementById('eng-' + key);
                if (key === engine) {
                    btn.style.color = engines[key].color;
                    btn.className = 'px-3 py-1 rounded-full bg-white/20 text-white font-bold shadow-lg transition-all shrink-0 scale-105 border border-white/20';
                } else {
                    btn.style.color = '';
                    btn.className = 'px-3 py-1 rounded-full text-white/60 hover:text-white transition-all shrink-0 hover:bg-white/10';
                }
            });
        }
        setSearchEngine(currentEngine);
        function handleSearch(event) {
            const query = document.getElementById('searchInput').value.trim();
            if (query) window.open(engines[currentEngine].url + encodeURIComponent(query), '_blank');
        }

        // 壁纸轮换 (动态适配收藏夹 + 必应 5 图)
        function toggleWallpaper() {
            if (wallpapersArray.length === 0) return;
            if (isSwitchingBg) return;
            isSwitchingBg = true;

            const switchTimeout = setTimeout(() => { isSwitchingBg = false; }, 5000);

            currentBgIndex = (currentBgIndex + 1) % wallpapersArray.length;
            const nextSrc = wallpapersArray[currentBgIndex] + '?v=' + vSuffix;

            const img1 = document.getElementById('bgImage1');
            const img2 = document.getElementById('bgImage2');

            const currentLayer = activeBgLayer === 1 ? img1 : img2;
            const hiddenLayer = activeBgLayer === 1 ? img2 : img1;

            hiddenLayer.onload = () => {
                clearTimeout(switchTimeout);
                hiddenLayer.style.opacity = '1';
                currentLayer.style.opacity = '0';
                activeBgLayer = activeBgLayer === 1 ? 2 : 1;

                const nextIdx = (currentBgIndex + 1) % wallpapersArray.length;
                const preload = new Image();
                preload.src = wallpapersArray[nextIdx] + '?v=' + vSuffix;

                setTimeout(() => {
                    isSwitchingBg = false;
                }, 1000);
            };

            hiddenLayer.onerror = () => {
                clearTimeout(switchTimeout);
                isSwitchingBg = false;
            };

            hiddenLayer.src = nextSrc;
        }

        // 行情条翻页逻辑 (AI漏掉的函数，已补全)
        function scrollTicker(amount) {
            document.getElementById('tickerScroll').scrollBy({ left: amount, behavior: 'smooth' });
        }


        // ================== 3. 天气与粒子物理引擎 ==================

        const canvas = document.getElementById('weatherCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;
        let uiBounds = [];
        let currentWeatherType = null;   // 'rain' | 'snow' | null
        let canvasFade = 0;              // 切换天气时的画布淡入 (0→1)

        // 鼠标气流场：粒子在光标附近被推开/打旋
        const mouse = { x: -9999, y: -9999, vx: 0, vy: 0, active: false, lastMove: 0 };
        window.addEventListener('pointermove', (e) => {
            mouse.vx = e.clientX - mouse.x;
            mouse.vy = e.clientY - mouse.y;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
            mouse.lastMove = performance.now();
        }, { passive: true });
        window.addEventListener('pointerleave', () => { mouse.active = false; }, { passive: true });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            _uiBoundsDirty = true;
            updateUIBounds();
        }

        // 按视口面积缩放粒子数，避免大屏太稀、小屏太密
        function particleCountFor(type) {
            const area = window.innerWidth * window.innerHeight;
            if (type === 'snow') return Math.max(120, Math.min(380, Math.round(area / 9000)));
            return Math.max(90, Math.min(300, Math.round(area / 12000)));   // rain
        }

        let _uiBoundsDirty = true;
        function updateUIBounds() {
            if (!_uiBoundsDirty) return;
            _uiBoundsDirty = false;
            const ids = ['search-bar', 'news-panel', 'bottom-ticker'];
            uiBounds = [];
            for (const id of ids) {
                const el = document.getElementById(id);
                if (!el) continue;
                const r = el.getBoundingClientRect();
                // 读取真实圆角半径，碰撞面才能贴合可见弧线（修复"打在空中"）
                let radius = parseFloat(getComputedStyle(el).borderTopLeftRadius) || 0;
                radius = Math.min(radius, r.width / 2, r.height / 2);
                uiBounds.push({ left: r.left, right: r.right, top: r.top, bottom: r.bottom, width: r.width, radius, snow: 0 });
            }
        }
        function markUIBoundsDirty() { _uiBoundsDirty = true; }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('scroll', markUIBoundsDirty, true);

        // 给定 x，返回该 bound 顶部可见表面的 y（圆角处抬高到弧线上）。x 在 bound 之外返回 null。
        function surfaceYAt(bound, x) {
            if (x < bound.left || x > bound.right) return null;
            const rad = bound.radius;
            if (rad <= 0) return bound.top;
            // 左圆角区
            if (x < bound.left + rad) {
                const dx = rad - (x - bound.left);
                return bound.top + (rad - Math.sqrt(Math.max(0, rad * rad - dx * dx)));
            }
            // 右圆角区
            if (x > bound.right - rad) {
                const dx = rad - (bound.right - x);
                return bound.top + (rad - Math.sqrt(Math.max(0, rad * rad - dx * dx)));
            }
            // 中间平直段
            return bound.top;
        }

        resizeCanvas();

        class WeatherParticle {
            constructor(type, seed) { this.type = type; this.reset(seed); }
            // seed=true：初始播种，散布在屏幕上方较高的带里，让雪/雨"开始下"而非瞬间铺满。
            // seed=false：落地/出界回收，只补在顶沿略上方，保持下落数量恒定、密度均匀。
            reset(seed) {
                this.x = Math.random() * canvas.width;
                if (seed) {
                    this.y = Math.random() * canvas.height - canvas.height; // [-H, 0)，自上而下渐入
                } else {
                    this.y = -10 - Math.random() * 40;                      // 顶沿略上方补员
                }
                this.prevY = this.y;
                this.isLanded = false;
                this.landedTime = 0;
                this.isSplashing = false;
                this.splashRadius = 0;
                this.splashAlpha = 1;
                this.splashX = 0;

                if (this.type === 'rain') {
                    this.speed = 14 + Math.random() * 8;
                    this.len = 16 + Math.random() * 16;
                    this.opacity = 0.16 + Math.random() * 0.22;
                    this.lineWidth = 0.7 + Math.random() * 0.7;
                } else {
                    this.speed = 0.6 + Math.random() * 1.8;
                    this.radius = Math.random() * 2.6 + 1.2;
                    this.opacity = 0.55 + Math.random() * 0.4;
                    this.swing = Math.random() * 2;
                    this.swingStep = Math.random() * 100;
                    this.vx = 0; // 受鼠标气流影响的横向速度
                }
            }

            applyMouseField() {
                // 仅在鼠标近期移动过时生效，避免静止光标持续吸附
                if (!mouse.active || performance.now() - mouse.lastMove > 600) return;
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist2 = dx * dx + dy * dy;
                const R = 110;
                if (dist2 > R * R || dist2 < 0.01) return;
                const dist = Math.sqrt(dist2);
                const force = (1 - dist / R);
                // 斥力（推开）+ 垂直分量制造打旋观感
                const push = force * (this.type === 'snow' ? 3.2 : 5.0);
                this.x += (dx / dist) * push + (-dy / dist) * push * 0.4 * (this.type === 'snow' ? 1 : 0.3);
                if (this.type === 'snow') this.y += (dy / dist) * push * 0.5;
            }

            update() {
                if (this.isLanded) {
                    this.landedTime++;
                    // 落地快速淡出回收（积雪由窗台积雪层呈现，不靠滞留个体堆叠）
                    if (this.landedTime > 90 + Math.random() * 90) {
                        this.opacity -= 0.02;
                        if (this.opacity <= 0) this.reset(false);
                    }
                    return;
                }

                if (this.isSplashing) {
                    this.splashRadius += 1.4;
                    this.splashAlpha -= 0.09;
                    if (this.splashAlpha <= 0) this.reset(false);
                    return;
                }

                this.applyMouseField();

                this.prevY = this.y;
                this.y += this.speed;
                if (this.type === 'snow') {
                    this.x += Math.sin(this.swingStep) * this.swing + this.vx;
                    this.swingStep += 0.02;
                    this.vx *= 0.94; // 鼠标横推后缓慢回稳
                }

                for (const bound of uiBounds) {
                    if (this.x <= bound.left || this.x >= bound.right) continue;
                    const surfY = surfaceYAt(bound, this.x);
                    if (surfY === null) continue;
                    // 叠加已积雪厚度：落点再抬高一点，雪会"落在雪上"
                    const landY = surfY - (this.type === 'snow' ? bound.snow : 0);
                    if (this.prevY < landY && this.y >= landY) {
                        if (this.type === 'snow') {
                            this.isLanded = true;
                            this.y = landY;
                            // 喂给窗台积雪层（缓慢变厚，封顶）
                            if (bound.snow < 14) bound.snow += 0.05;
                        } else {
                            this.isSplashing = true;
                            this.splashX = this.x;
                            this.y = landY;
                            this.splashRadius = 1;
                            this.splashAlpha = 0.55;
                        }
                        return;
                    }
                }

                if (this.y > canvas.height + 50) this.reset(false);
            }
            draw() {
                if (this.isLanded) {
                    ctx.beginPath();
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.ellipse(this.x, this.y, this.radius * 2, this.radius * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();
                    return;
                }

                if (this.isSplashing) {
                    const r = Math.min(this.splashRadius, 10);
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(220, 238, 255, ${this.splashAlpha})`;
                    ctx.lineWidth = 1.4;
                    ctx.ellipse(this.splashX, this.y, r, r * 0.4, 0, Math.PI, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = `rgba(220, 238, 255, ${this.splashAlpha})`;
                    ctx.beginPath();
                    ctx.arc(this.splashX - r, this.y - r * 0.4, 0.8, 0, Math.PI * 2);
                    ctx.arc(this.splashX + r, this.y - r * 0.4, 0.8, 0, Math.PI * 2);
                    ctx.fill();
                    return;
                }

                if (this.type === 'rain') {
                    const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.len);
                    grad.addColorStop(0, `rgba(200, 222, 250, 0)`);
                    grad.addColorStop(0.5, `rgba(208, 230, 255, ${this.opacity})`);
                    grad.addColorStop(1, `rgba(200, 222, 250, 0)`);
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = this.lineWidth;
                    ctx.lineCap = 'butt';
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x, this.y + this.len);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // 窗台积雪层：沿每个 UI 顶沿（含圆角弧线）描出一条随时间变厚的白边
        function drawSnowLedges() {
            for (const bound of uiBounds) {
                if (bound.snow <= 0.3) continue;
                const depth = bound.snow;
                ctx.save();
                ctx.beginPath();
                const step = 4;
                ctx.moveTo(bound.left, surfaceYAt(bound, bound.left));
                for (let x = bound.left; x <= bound.right; x += step) {
                    ctx.lineTo(x, surfaceYAt(bound, x) - 0);
                }
                // 回扫上沿（抬高 depth）形成厚度带
                for (let x = bound.right; x >= bound.left; x -= step) {
                    ctx.lineTo(x, surfaceYAt(bound, x) - depth);
                }
                ctx.closePath();
                const g = ctx.createLinearGradient(0, bound.top - depth, 0, bound.top + 2);
                g.addColorStop(0, 'rgba(255,255,255,0.92)');
                g.addColorStop(1, 'rgba(255,255,255,0.55)');
                ctx.fillStyle = g;
                ctx.fill();
                ctx.restore();
            }
        }

        let _uiBoundsFrame = 0;
        function animateWeather() {
            _uiBoundsFrame++;
            if (_uiBoundsFrame % 60 === 0) _uiBoundsDirty = true;
            updateUIBounds();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 切换天气时整层淡入，消除"啪"地铺满的突兀感
            if (canvasFade < 1) canvasFade = Math.min(1, canvasFade + 0.02);
            ctx.globalAlpha = canvasFade;
            if (currentWeatherType === 'snow') drawSnowLedges();
            particles.forEach(p => { p.update(); p.draw(); });
            ctx.globalAlpha = 1;
            animationId = requestAnimationFrame(animateWeather);
        }

        function applyEnvironmentFilter(weatherKeyword) {
            const overlay = document.getElementById('weatherOverlay');
            cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
            canvasFade = 0;
            _uiBoundsDirty = true; updateUIBounds();
            // 重置积雪厚度，避免切走再切回时残留旧雪
            uiBounds.forEach(b => b.snow = 0);

            if (weatherKeyword.includes('🌧️') || weatherKeyword.includes('雨')) {
                currentWeatherType = 'rain';
                overlay.className = "absolute inset-0 bg-blue-900/30 transition-colors duration-1000 z-20";
                const n = particleCountFor('rain');
                for (let i = 0; i < n; i++) particles.push(new WeatherParticle('rain', true));
                animateWeather();
                setWeatherAmbient('rain');
            } else if (weatherKeyword.includes('☀️') || weatherKeyword.includes('晴')) {
                currentWeatherType = null;
                overlay.className = "absolute inset-0 bg-amber-200/12 transition-colors duration-1000 z-20";
                setWeatherAmbient('sunny');
            } else if (weatherKeyword.includes('❄️') || weatherKeyword.includes('雪')) {
                currentWeatherType = 'snow';
                overlay.className = "absolute inset-0 bg-slate-800/40 transition-colors duration-1000 z-20";
                const n = particleCountFor('snow');
                for (let i = 0; i < n; i++) particles.push(new WeatherParticle('snow', true));
                animateWeather();
                setWeatherAmbient('snow');
            } else {
                currentWeatherType = null;
                overlay.className = "absolute inset-0 bg-black/30 transition-colors duration-1000 z-20";
                setWeatherAmbient('none');
            }
        }

        // 氛围桥接：天气引擎 → 视觉增强钩子（晴天 sunny→sun，光晕/星空/雷暴在 §7 内响应）
        function setWeatherAmbient(kind) {
            const map = { rain: 'rain', snow: 'snow', sunny: 'sun', none: 'none' };
            const ambiance = map[kind] || 'none';
            if (typeof window.__setAmbiance === 'function') window.__setAmbiance(ambiance);
            else window.__weatherAmbiance = ambiance; // §7 尚未就绪时暂存，初始化后会自行校准
        }

        let realWeather = '';
        const filterModes = ['auto', '晴', '雨', '雪'];
        const filterIcons = ['✨', '☀️', '🌧️', '❄️'];
        let currentFilterIndex = 0;

        function toggleWeatherFilter() {
            currentFilterIndex = (currentFilterIndex + 1) % 4;
            const mode = filterModes[currentFilterIndex];
            document.getElementById('filterBtn').innerText = filterIcons[currentFilterIndex];
            if (mode === 'auto') applyEnvironmentFilter(realWeather);
            else applyEnvironmentFilter(mode);
        }

        async function fetchWeather() {
            try {
                const response = await fetch('./weather.txt?t=' + Date.now());
                if (!response.ok) throw new Error();
                const text = await response.text();
                if (!text.includes('失败')) {
                    realWeather = text;
                    document.getElementById('weatherInfo').innerText = text;
                    if (filterModes[currentFilterIndex] === 'auto') applyEnvironmentFilter(realWeather);
                }
            } catch { document.getElementById('weatherInfo').innerText = '暂无天气数据'; }
        }
        fetchWeather(); setInterval(fetchWeather, 600000);

        // ================== 4. 底部行情双行排版 ==================

        const SPARKLINE_MIN_POINTS = 3;

        function buildSparklineSVG(history, isUp) {
            if (!history || history.length < 2) return '';
            const w = 36, h = 14;
            const min = Math.min(...history), max = Math.max(...history);
            const range = max - min || 1;
            const pts = history.map((v, i) => {
                const x = (i / (history.length - 1)) * w;
                const y = h - ((v - min) / range) * (h - 2) - 1;
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(' ');
            const color = isUp ? '#f87171' : '#34d399';
            return `<svg class="sparkline-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline class="sparkline-poly" points="${pts}" stroke="${color}" opacity="0.6"/></svg>`;
        }

        async function fetchTickerData() {
            try {
                const response = await fetch('./ticker.json?t=' + Date.now());
                const items = await response.json();
                const container = document.getElementById('tickerContent');
                if (!items || items.length === 0) return;

                // 优化：如果后端增删了行情条目（数量不一致），则清空重绘，确保列表同步
                if (container.children.length !== items.length) container.innerHTML = '';

                if (container.children.length === 0) {
                    items.forEach(item => {
                        const showSparkline = item.price_history && item.price_history.length >= SPARKLINE_MIN_POINTS;
                        const wrapper = document.createElement('div');
                        wrapper.className = 'flex flex-col justify-center min-w-max px-1.5 gap-0';
                        wrapper.dataset.symbol = item.symbol;

                        const topRow = document.createElement('div');
                        topRow.className = 'flex items-center gap-1';
                        const nameSpan = document.createElement('span');
                        nameSpan.className = 'text-[9px] text-white/50 tracking-wide drop-shadow-md name-val whitespace-nowrap';
                        nameSpan.textContent = item.name;
                        topRow.appendChild(nameSpan);
                        if (showSparkline) {
                            const sparkSpan = document.createElement('span');
                            sparkSpan.className = 'sparkline-container inline-flex items-center';
                            sparkSpan.dataset.symbol = item.symbol;
                            topRow.appendChild(sparkSpan);
                        }
                        wrapper.appendChild(topRow);

                        const botRow = document.createElement('div');
                        botRow.className = 'flex items-baseline gap-1';
                        const priceSpan = document.createElement('span');
                        priceSpan.className = 'text-[10px] font-bold text-white drop-shadow-md numeric price-val whitespace-nowrap';
                        priceSpan.textContent = '--';
                        const changeSpan = document.createElement('span');
                        changeSpan.className = 'text-[9px] font-semibold drop-shadow-md numeric change-val whitespace-nowrap';
                        changeSpan.textContent = '--';
                        botRow.appendChild(priceSpan);
                        botRow.appendChild(changeSpan);
                        wrapper.appendChild(botRow);

                        container.appendChild(wrapper);
                    });
                }

                items.forEach(item => {
                    const el = container.querySelector(`[data-symbol="${item.symbol}"]`);
                    if (el) {
                        const nameEl = el.querySelector('.name-val');
                        if (nameEl) nameEl.innerText = item.name;
                        const priceEl = el.querySelector('.price-val');
                        // 价格变化时做数字滚动插值（保留货币符号/千分位格式）
                        if (window.__animateNumber) window.__animateNumber(priceEl, item.price);
                        else priceEl.innerText = item.price;
                        const cEl = el.querySelector('.change-val');
                        const isUp = !item.change.startsWith('-');
                        cEl.innerText = (isUp ? '▲' : '▼') + ' ' + item.change;
                        cEl.className = `text-[9px] font-semibold drop-shadow-md numeric change-val whitespace-nowrap ${isUp ? 'text-rose-400' : 'text-emerald-400'}`;
                        const sparkContainer = el.querySelector('.sparkline-container');
                        if (sparkContainer && item.price_history && item.price_history.length >= SPARKLINE_MIN_POINTS) {
                            // 仅在折线数据实际变化时重绘并触发画入动画
                            const sig = item.price_history.join(',');
                            if (sparkContainer.dataset.sig !== sig) {
                                sparkContainer.dataset.sig = sig;
                                sparkContainer.innerHTML = DOMPurify.sanitize(buildSparklineSVG(item.price_history, isUp));
                                if (window.__drawInSparkline) window.__drawInSparkline(sparkContainer);
                            }
                        }
                    }
                });
            } catch { console.error("行情同步异常"); }
        }
        fetchTickerData(); setInterval(fetchTickerData, 20000);

        async function fetchTickerStatus() {
            try {
                const resp = await fetch('./ticker-status.json?t=' + Date.now());
                const ts = await resp.json();
                if (!ts || !ts.status) return;
                const statusText = document.getElementById('statusText');
                const statusPing = document.getElementById('statusPing');
                const statusDot = document.getElementById('statusDot');

                const ageMinutes = ts.updated_at ? (Date.now() / 1000 - ts.updated_at) / 60 : 0;
                if (ageMinutes > 5) {
                    statusText.innerText = '离线';
                    statusText.className = 'text-[10px] font-bold text-red-400';
                    statusPing.className = 'hidden';
                    statusDot.className = 'relative inline-flex rounded-full h-2 w-2 bg-red-500';
                    statusDot.parentElement.parentElement.title = '行情数据超过5分钟未更新';
                    return;
                }

                if (ts.status === 'failed') {
                    statusText.innerText = '行情失败';
                    statusText.className = 'text-[10px] font-bold text-red-400';
                    statusPing.className = 'hidden';
                    statusDot.className = 'relative inline-flex rounded-full h-2 w-2 bg-red-500';
                    statusDot.parentElement.parentElement.title = '行情源失败，当前显示上次成功数据';
                } else if (ts.status === 'degraded') {
                    statusText.innerText = '降级';
                    statusText.className = 'text-[10px] font-bold text-amber-400';
                    statusPing.className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75';
                    statusDot.className = 'relative inline-flex rounded-full h-2 w-2 bg-amber-500';
                    statusDot.parentElement.parentElement.title = '行情源降级，部分使用备用源';
                } else {
                    statusText.innerText = 'LIVE';
                    statusText.className = 'text-[10px] font-bold text-green-400';
                    statusPing.className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75';
                    statusDot.className = 'relative inline-flex rounded-full h-2 w-2 bg-green-500';
                    statusDot.parentElement.parentElement.title = '行情源正常';
                }
            } catch { /* ticker-status 不可用时保持原状 */ }
        }
        fetchTickerStatus(); setInterval(fetchTickerStatus, 20000);

        // ================== 5. 新闻流与交互渲染 ==================

        let allNewsData = [];
        let currentFilter = 'all';
        let lastFirstNewsHash = '';
        let currentFontSize = 'sm';

        function simpleHash(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) {
                h = ((h << 5) - h + str.charCodeAt(i)) | 0;
            }
            return h;
        }

        // 统一渲染函数：根据当前数据和过滤条件，全量重绘列表
        function renderNewsList() {
            const listContainer = document.getElementById('newsList');
            const filtered = allNewsData.filter(applyFilter);

            updateTabCounts();
            listContainer.innerHTML = '';
            if (filtered.length === 0) {
                listContainer.innerHTML = '<div class="text-center text-white/30 mt-10 text-sm">暂无对应快讯</div>';
            } else {
                filtered.forEach(n => listContainer.appendChild(createNewsElement(n)));
            }
        }

        // 字体切换 (0 延时本地秒切)
        function setFontSize(size) {
            currentFontSize = size;
            ['sm', 'base', 'lg'].forEach(s => {
                const btn = document.getElementById('fs-' + s);
                if (s === size) { btn.classList.add('bg-white/20', 'text-white'); btn.classList.remove('text-white/50'); }
                else { btn.classList.remove('bg-white/20', 'text-white'); btn.classList.add('text-white/50'); }
            });
            renderNewsList();
        }

        // 分类强调色（rgb 三元组，驱动指示器背景/描边/辉光）
        const TAB_ACCENTS = {
            all: '255,255,255',
            news: '96,165,250',     // 蓝
            foreign: '251,191,36',  // 琥珀
            tech: '167,139,250',    // 紫
        };

        // 移动滑动高亮指示器到当前激活 tab
        function moveTabIndicator(filter) {
            const bar = document.getElementById('tabBar');
            const btn = document.getElementById('tab-' + filter);
            const ind = document.getElementById('tabIndicator');
            if (!bar || !btn || !ind) return;
            const accent = TAB_ACCENTS[filter] || TAB_ACCENTS.all;
            ind.style.left = btn.offsetLeft + 'px';
            ind.style.width = btn.offsetWidth + 'px';
            ind.style.background = `rgba(${accent},0.18)`;
            ind.style.border = `1px solid rgba(${accent},0.45)`;
            ind.style.boxShadow = `0 0 14px rgba(${accent},0.35), inset 0 1px 0 rgba(255,255,255,0.15)`;
        }

        // 更新各分类实时数量角标
        function updateTabCounts() {
            const counts = { all: allNewsData.length, news: 0, foreign: 0, tech: 0 };
            for (const n of allNewsData) {
                const c = n.category;
                if (c === 'news' || c === 'foreign' || c === 'tech') counts[c]++;
            }
            for (const k of ['all', 'news', 'foreign', 'tech']) {
                const el = document.getElementById('count-' + k);
                if (el) el.textContent = counts[k] ? String(counts[k]) : '';
            }
        }

        // 切换分类 Tab
        function setFilter(filter) {
            currentFilter = filter;
            ['all', 'news', 'foreign', 'tech'].forEach(t => {
                const btn = document.getElementById('tab-' + t);
                if (btn) btn.classList.toggle('active', t === filter);
            });
            moveTabIndicator(filter);
            renderNewsList();
        }

        function sanitizeHttpUrl(url) {
            if (!url) return '';
            try {
                const parsed = new URL(url, window.location.origin);
                return ['http:', 'https:'].includes(parsed.protocol) ? parsed.href : '';
            } catch {
                return '';
            }
        }

        function normalizeNewsDisplayText(news) {
            const rawText = news.display_content || news.content || '';
            if ((news.category || '') === 'news') {
                return rawText.replace(/^【[^】]+】\s*/, '');
            }
            return rawText;
        }

        function createNewsElement(news, isNew = false) {
            const fs = currentFontSize === 'sm' ? 'text-sm' : (currentFontSize === 'base' ? 'text-base' : 'text-lg');
            const item = document.createElement('div');
            const header = document.createElement('div');
            const body = document.createElement('div');
            const displayText = normalizeNewsDisplayText(news);
            const safeUrl = sanitizeHttpUrl(news.url);
            const isHtmlBlock = news.format === 'html';
            // 普通项：仅底部细分隔线；重要项：左侧红色色条 + 浅红背景强调
            const importantClass = news.is_important
                ? ' border-l-2 border-red-500/40 bg-red-500/[0.07] pl-3 rounded-r-lg'
                : ' px-1';

            item.className = `${importantClass} py-2.5 border-b border-white/[0.07] last:border-b-0 news-item-hover [&_a]:text-blue-400 [&_a]:underline [&_a]:hover:text-blue-300` + (isNew ? ' animate-slide-down' : '');

            header.className = 'text-[11px] text-white/40 font-mono mb-0.5 flex items-center';
            header.append(document.createTextNode(news.time || ''));
            if (news.is_important) {
                const badge = document.createElement('span');
                badge.className = 'ml-2 px-1.5 py-0.5 bg-red-500/20 text-red-400 text-[9px] font-bold rounded border border-red-500/30 animate-pulse';
                badge.textContent = 'IMPORTANT';
                header.appendChild(badge);
            }

            body.className = `${fs} leading-loose text-white/90 drop-shadow-sm tech-content`;
            if (isHtmlBlock) {
                body.innerHTML = DOMPurify.sanitize(news.content || '');
            } else if (safeUrl) {
                const link = document.createElement('a');
                link.href = safeUrl;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                link.className = 'news-link visited:text-sky-200';
                link.textContent = displayText;
                body.appendChild(link);
            } else {
                body.textContent = displayText;
            }

            item.appendChild(header);
            item.appendChild(body);
            return item;
        }

        function applyFilter(n) {
            const category = n.category || 'all';
            if (currentFilter === 'news') return category === 'news';
            if (currentFilter === 'foreign') return category === 'foreign';
            if (currentFilter === 'tech') return category === 'tech';
            return true;
        }

        async function fetchRealNews() {
            try {
                const response = await fetch('./finance-news.json?t=' + Date.now());
                const data = await response.json();

                const newsList = (data.news_list || []).map(item => {
                    const normalized = { ...item };
                    if (!normalized.category) {
                        if ((normalized.content || '').includes('GitHub') || (normalized.content || '').includes('HN') || (normalized.content || '').includes('V2EX')) normalized.category = 'tech';
                        else if (normalized.url) normalized.category = 'foreign';
                        else normalized.category = 'news';
                    }
                    if (!normalized.format) normalized.format = normalized.category === 'tech' && !normalized.url ? 'html' : 'text';
                    return normalized;
                });
                if (!newsList || newsList.length === 0) return;

                const listContainer = document.getElementById('newsList');

                // 首次加载：初始化数据并全量渲染
                if (allNewsData.length === 0) {
                    allNewsData = newsList;
                    lastFirstNewsHash = simpleHash(newsList[0].content);
                    document.getElementById('lastUpdateTime').innerText = `${newsList[0].time}`;
                    const sk = document.getElementById('newsSkeleton');
                    if (sk) sk.remove();
                    renderNewsList();
                    return;
                }

                // 增量同步：发现新数据时，执行平滑插入
                const newFirstHash = simpleHash(newsList[0].content);
                if (newFirstHash !== lastFirstNewsHash) {
                    const newItems = [];
                    for (let n of newsList) {
                        if (simpleHash(n.content) === lastFirstNewsHash) break;
                        if (applyFilter(n)) newItems.push(n);
                    }

                    allNewsData = newsList;
                    document.getElementById('lastUpdateTime').innerText = `${newsList[0].time}`;
                    updateTabCounts();

                    if (newItems.length > 0) {
                        const currentScroll = listContainer.scrollTop;
                        const oldHeight = listContainer.scrollHeight;

                        newItems.reverse().forEach(n => {
                            listContainer.prepend(createNewsElement(n, true));
                        });

                        if (currentScroll > 10) {
                            listContainer.scrollTop = currentScroll + (listContainer.scrollHeight - oldHeight);
                        }
                    } else {
                        renderNewsList();
                    }
                    lastFirstNewsHash = newFirstHash;
                }
            } catch (e) {
                console.error("快讯同步失败:", e);
                document.getElementById('statusText').innerText = '断连';
                document.getElementById('statusText').className = 'text-[10px] font-bold text-red-400';
                document.getElementById('statusPing').className = 'hidden';
                document.getElementById('statusDot').className = 'relative inline-flex rounded-full h-2 w-2 bg-red-500';
            }
        }

        // ================== 6. 辅助交互与快捷键 ==================

        // 全局快捷键监听
        window.addEventListener('keydown', (e) => {
            const searchInput = document.getElementById('searchInput');
            // 一键聚焦搜索框 ( / 键 )
            if (e.key === '/' && document.activeElement !== searchInput && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                e.preventDefault();
                searchInput.focus();
            }
            // 一键清空并退出搜索 ( Esc 键 )
            if (e.key === 'Escape' && document.activeElement === searchInput) {
                searchInput.value = '';
                searchInput.blur();
            }
        });

        // 回到顶部悬浮按钮
        const newsListEl = document.getElementById('newsList');
        const bttBtn = document.getElementById('backToTop');
        newsListEl.addEventListener('scroll', () => {
            if (newsListEl.scrollTop > 300) { bttBtn.classList.remove('opacity-0', 'pointer-events-none'); bttBtn.classList.add('opacity-100'); }
            else { bttBtn.classList.add('opacity-0', 'pointer-events-none'); bttBtn.classList.remove('opacity-100'); }
        });
        function scrollToTop() { newsListEl.scrollTo({ top: 0, behavior: 'smooth' }); }

        // 侧边栏拖拽拉伸
        const aside = document.querySelector('aside');
        const resizer = document.getElementById('resizer');
        let isResizing = false;

        // 初始化加载宽度
        const savedWidth = localStorage.getItem('newsPanelWidth');
        if (savedWidth && window.innerWidth >= 768) {
            aside.style.width = `${savedWidth}px`;
        }

        resizer.addEventListener('mousedown', () => { if (window.innerWidth < 768) return; isResizing = true; document.body.style.cursor = 'ew-resize'; aside.classList.add('select-none'); });
        resizer.addEventListener('touchstart', (e) => { if (window.innerWidth < 768) return; isResizing = true; aside.classList.add('select-none'); }, { passive: true });
        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const newWidth = window.innerWidth - e.clientX;
            if (newWidth >= 350 && newWidth <= window.innerWidth * 0.6) {
                aside.style.width = `${newWidth}px`;
            }
        });
        window.addEventListener('touchmove', (e) => {
            if (!isResizing) return;
            const touch = e.touches[0];
            const newWidth = window.innerWidth - touch.clientX;
            if (newWidth >= 350 && newWidth <= window.innerWidth * 0.6) {
                aside.style.width = `${newWidth}px`;
            }
        }, { passive: true });
        window.addEventListener('mouseup', () => {
            if (isResizing) {
                localStorage.setItem('newsPanelWidth', aside.offsetWidth);
            }
            isResizing = false;
            document.body.style.cursor = 'default';
            aside.classList.remove('select-none');
        });
        window.addEventListener('touchend', () => {
            if (isResizing) {
                localStorage.setItem('newsPanelWidth', aside.offsetWidth);
            }
            isResizing = false;
            aside.classList.remove('select-none');
        });

        // 初始拉取快讯
        setFilter('all');                  // 初始化激活态 + 滑动指示器定位
        fetchRealNews(); setInterval(fetchRealNews, 30000);
        // 窗口尺寸变化时重新对齐指示器（tab 宽度会随之变化）
        window.addEventListener('resize', () => moveTabIndicator(currentFilter));

        // 玻璃折射：仅在浏览器支持 url() backdrop-filter、非省电模式、且非窄屏时启用
        (function enableGlassRefraction() {
            const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const wide = window.innerWidth >= 768;
            const supported = (window.CSS && CSS.supports &&
                (CSS.supports('backdrop-filter', 'url(#glassDisplace)') ||
                 CSS.supports('-webkit-backdrop-filter', 'url(#glassDisplace)')));
            if (supported && !reduce && wide) {
                document.documentElement.classList.add('glass-refract');
            }
        })();

        // ================== 7. 视觉增强：进场 / 光斑 / 磁吸 / 时段 / 雷暴 / 星空 / 数字滚动 ==================
        (function visualEnhancements() {
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            // ---- 7.1 进场错峰动画：逐个触发 .entered ----
            const enterEls = Array.from(document.querySelectorAll('[data-enter]'));
            if (reduceMotion) {
                enterEls.forEach(el => { el.style.opacity = '1'; });
            } else {
                requestAnimationFrame(() => {
                    enterEls.forEach(el => el.classList.add('entered'));
                });
            }

            // ---- 7.2 玻璃面板鼠标光斑：跟随指针的柔光 ----
            const spotEls = Array.from(document.querySelectorAll('.glass-spot'));
            spotEls.forEach(el => {
                el.addEventListener('pointermove', (e) => {
                    const r = el.getBoundingClientRect();
                    el.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%');
                    el.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100).toFixed(1) + '%');
                    el.style.setProperty('--spot', '1');
                });
                el.addEventListener('pointerleave', () => el.style.setProperty('--spot', '0'));
            });

            // ---- 7.3 Dock 图标磁吸放大：靠近指针的图标按距离放大 ----
            const dockRow = document.getElementById('dockRow');
            if (dockRow && !reduceMotion) {
                const icos = Array.from(dockRow.querySelectorAll('.dock-ico'));
                const MAX = 1.32, RANGE = 110; // 最大放大倍率 / 影响半径(px)
                dockRow.addEventListener('pointermove', (e) => {
                    icos.forEach(ico => {
                        const r = ico.getBoundingClientRect();
                        const cx = r.left + r.width / 2;
                        const d = Math.abs(e.clientX - cx);
                        const f = Math.max(0, 1 - d / RANGE);
                        const scale = 1 + (MAX - 1) * f;
                        ico.style.transform = `scale(${scale.toFixed(3)})`;
                    });
                });
                dockRow.addEventListener('pointerleave', () => {
                    icos.forEach(ico => { ico.style.transform = ''; });
                });
            }

            // ---- 7.4 时段自适应色调：很淡的 soft-light 叠色，夜晚偏冷 ----
            const timeTint = document.getElementById('timeTint');
            const starCanvas = document.getElementById('starCanvas');
            function applyTimeTint() {
                if (!timeTint) return;
                const h = new Date().getHours();
                let bg, opacity;
                if (h >= 5 && h < 9) {
                    // 清晨：极淡的暖橘
                    bg = 'linear-gradient(160deg, rgba(255,214,170,0.5), rgba(255,180,150,0.25))';
                    opacity = '0.35';
                } else if (h >= 9 && h < 17) {
                    // 白天：几乎中性，略微提亮
                    bg = 'linear-gradient(160deg, rgba(255,250,235,0.35), rgba(220,235,255,0.2))';
                    opacity = '0.22';
                } else if (h >= 17 && h < 20) {
                    // 黄昏：淡金紫
                    bg = 'linear-gradient(160deg, rgba(255,190,140,0.5), rgba(170,140,200,0.3))';
                    opacity = '0.4';
                } else {
                    // 夜晚（用户主要使用时段）：冷蓝靛，营造沉静氛围
                    bg = 'linear-gradient(160deg, rgba(90,120,180,0.55), rgba(40,60,110,0.4))';
                    opacity = '0.5';
                }
                timeTint.style.background = bg;
                timeTint.style.opacity = opacity;
                // 夜晚开启星空（仅在非雨雪氛围下由 setAmbiance 控制可见性）
                document.body.dataset.daypart = (h >= 20 || h < 5) ? 'night' : 'day';
                refreshStarVisibility();
            }

            // ---- 7.5 雷暴闪电：仅雨模式下偶发泛光 ----
            const lightning = document.getElementById('lightningFlash');
            let lightningTimer = null;
            function scheduleLightning() {
                if (!lightning) return;
                const delay = 18000 + Math.random() * 30000; // 18~48s 一次
                lightningTimer = setTimeout(() => {
                    if (window.__weatherAmbiance === 'rain' && !reduceMotion) {
                        lightning.classList.remove('flash');
                        void lightning.offsetWidth; // 重排以重启动画
                        lightning.classList.add('flash');
                    }
                    scheduleLightning();
                }, delay);
            }
            lightning && lightning.addEventListener('animationend', () => lightning.classList.remove('flash'));

            // ---- 7.6 夜晚星空：缓慢闪烁的星点 ----
            let stars = [], starAnimId = null, starCtx = null;
            function initStars() {
                if (!starCanvas) return;
                starCtx = starCanvas.getContext('2d');
                starCanvas.width = window.innerWidth;
                starCanvas.height = window.innerHeight;
                const count = Math.min(140, Math.floor(window.innerWidth * window.innerHeight / 14000));
                stars = [];
                for (let i = 0; i < count; i++) {
                    stars.push({
                        x: Math.random() * starCanvas.width,
                        y: Math.random() * starCanvas.height * 0.75, // 多集中在上方天空
                        r: Math.random() * 1.1 + 0.3,
                        base: Math.random() * 0.4 + 0.25,
                        amp: Math.random() * 0.4 + 0.2,
                        ph: Math.random() * Math.PI * 2,
                        sp: Math.random() * 0.015 + 0.005
                    });
                }
            }
            function animateStars() {
                if (!starCtx) return;
                starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
                for (const s of stars) {
                    s.ph += s.sp;
                    const a = s.base + Math.sin(s.ph) * s.amp;
                    starCtx.beginPath();
                    starCtx.fillStyle = `rgba(220, 232, 255, ${Math.max(0, a).toFixed(3)})`;
                    starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    starCtx.fill();
                }
                starAnimId = requestAnimationFrame(animateStars);
            }
            function refreshStarVisibility() {
                if (!starCanvas) return;
                const isNight = document.body.dataset.daypart === 'night';
                // 雨/雪氛围下不显示星空，避免画面杂乱
                const ambiance = window.__weatherAmbiance;
                const show = isNight && !reduceMotion && ambiance !== 'rain' && ambiance !== 'snow';
                if (show) {
                    if (!stars.length) initStars();
                    if (!starAnimId) animateStars();
                    starCanvas.style.opacity = '0.9';
                } else {
                    starCanvas.style.opacity = '0';
                    if (starAnimId) { cancelAnimationFrame(starAnimId); starAnimId = null; }
                }
            }
            window.addEventListener('resize', () => {
                if (starAnimId) { initStars(); }
            });

            // ---- 暴露给天气引擎调用的氛围切换钩子 ----
            window.__setAmbiance = function (ambiance) {
                window.__weatherAmbiance = ambiance; // 'rain' | 'snow' | 'sun' | 'none'
                const sunGlow = document.getElementById('sunGlow');
                if (sunGlow) sunGlow.classList.toggle('on', ambiance === 'sun');
                if (ambiance === 'rain') { if (!lightningTimer) scheduleLightning(); }
                refreshStarVisibility();
            };

            applyTimeTint();
            setInterval(applyTimeTint, 5 * 60 * 1000); // 每 5 分钟校准一次时段

            // ---- 7.7 行情数字滚动 + sparkline 画入：作为全局工具暴露 ----
            // 数字滚动：把字符串价格里的数字部分做插值动画，保留非数字格式（货币符号/逗号）
            window.__animateNumber = function (el, toStr) {
                if (reduceMotion) { el.innerText = toStr; return; }
                const fromStr = el.dataset.rawVal || '';
                const toNum = parseFloat(String(toStr).replace(/[^0-9.\-]/g, ''));
                const fromNum = parseFloat(String(fromStr).replace(/[^0-9.\-]/g, ''));
                el.dataset.rawVal = toStr;
                if (isNaN(toNum) || isNaN(fromNum) || fromNum === toNum) { el.innerText = toStr; return; }
                // 推断小数位与千分位格式
                const decimals = (String(toStr).split('.')[1] || '').replace(/[^0-9]/g, '').length;
                const hasComma = /,/.test(String(toStr));
                const prefix = (String(toStr).match(/^[^0-9.\-]+/) || [''])[0];
                const suffix = (String(toStr).match(/[^0-9.,]+$/) || [''])[0];
                const dur = 600, t0 = performance.now();
                if (el.__numRAF) cancelAnimationFrame(el.__numRAF);
                function fmt(v) {
                    let s = v.toFixed(decimals);
                    if (hasComma) {
                        const parts = s.split('.');
                        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                        s = parts.join('.');
                    }
                    return prefix + s + suffix;
                }
                function step(now) {
                    const p = Math.min(1, (now - t0) / dur);
                    const eased = 1 - Math.pow(1 - p, 3);
                    el.innerText = fmt(fromNum + (toNum - fromNum) * eased);
                    if (p < 1) el.__numRAF = requestAnimationFrame(step);
                    else el.innerText = toStr;
                }
                el.__numRAF = requestAnimationFrame(step);
            };

            // sparkline 画入：为新插入的折线测量长度并触发描绘动画
            window.__drawInSparkline = function (container) {
                if (reduceMotion) return;
                const poly = container.querySelector('.sparkline-poly');
                if (!poly || typeof poly.getTotalLength !== 'function') return;
                let len = 0;
                try { len = poly.getTotalLength(); } catch { return; }
                if (!len) return;
                poly.style.setProperty('--spark-len', Math.ceil(len));
                poly.classList.remove('draw-in');
                void poly.getBoundingClientRect();
                poly.classList.add('draw-in');
            };
        })();
    </script>
